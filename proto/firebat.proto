// Firebat Core gRPC schema (v1.0 Final Phase A — skeleton + service 분리).
//
// Phase A: 21 매니저 + cross-cutting service skeleton 정의. RPC list 작성.
//          message body 는 JsonValue 단일화 — Phase B 에서 매니저별 typed message 로 점진 변환.
// Phase B: 각 매니저 Rust 구현하면서 typed request/response 정의.
//
// 사용 path:
//  - Rust Core: tonic-build (build.rs) 가 .proto 컴파일 → src/proto/ 자동 생성
//  - TS client (lib/core-client.ts 의 'rust' backend): @grpc/grpc-js + protoc-gen-ts
//
// 21 매니저:
//   AiManager / StorageManager / PageManager / ProjectManager / ModuleManager
//   TaskManager / ScheduleManager / SecretManager / McpManager / CapabilityManager
//   AuthManager / ConversationManager / MediaManager / EventManager / StatusManager
//   CostManager / ToolManager / EntityManager / EpisodicManager / ConsolidationManager / TemplateManager
//
// Cross-cutting (Core facade 직속): Settings / Network / Cache / Telegram / Database / Lifecycle / Memory file

syntax = "proto3";

package firebat.v1;

// ──────────────────────────────────────────────────────────────────────────
// 공통 타입
// ──────────────────────────────────────────────────────────────────────────

message Empty {}

/** Phase A: typed message 정의 전 사용. JSON 직렬화 string. Phase B 에서 매니저별 typed 로 swap. */
message JsonValue {
  string raw = 1;
}

/** 인자 0~N 개 — JsonValue 배열. 단일 객체면 raw=JSON 문자열, 다인자면 array. */
message JsonArgs {
  string raw = 1;
}

/** ID 단일 인자 — string 또는 number 허용 */
message IdRequest {
  string id = 1;
}

message StringRequest { string value = 1; }
message NumberRequest { int64 value = 1; }
message BoolRequest { bool value = 1; }

/** 헬스 / 버전 정보 */
message HealthInfo {
  string version = 1;
  int64 uptime_ms = 2;
  bool ready = 3;
  repeated string active_managers = 4;
}

// ──────────────────────────────────────────────────────────────────────────
// 1. AiService — AiManager
//   process / requestActionWithTools / codeAssist / runAgentJob / resolveCallTarget /
//   spawnSubAgent / isSubAgentEnabled / setSubAgentEnabled
// ──────────────────────────────────────────────────────────────────────────
// AiService typed messages
/** LlmCallOpts — 옵션 전달 (model / temperature / system_prompt / mcp_token 등 다수 field).
    동적 schema 라 JSON 문자열 raw 으로 직렬화. Rust 가 serde_json::from_str 으로 LlmCallOpts struct 로 deserialize. */
message LlmCallOptsPb {
  string opts_json = 1;
}

/** ToolDefinition list — 도구 schema 배열. 동적 JSON. */
message ToolDefinitionsPb {
  string tools_json = 1;
}

/** PendingTool entry — args 는 임의 JSON. */
message PendingToolPb {
  string name = 1;
  string args_json = 2;
  string summary = 3;
}

/** propose_plan step — 동적 schema (EXECUTE / MCP_CALL / NETWORK_REQUEST 등). */
message PlanStepPb {
  string step_json = 1;
}

// ─── AiService typed Request / Response messages ──────────────────────────
// 옛 공유 타입 (Empty / BoolRequest / StringRequest / RawJsonPb / AiTextResultPb)
// → RPC 별 unique 분리 (buf STANDARD lint RPC_REQUEST_RESPONSE_UNIQUE).
message AiProcessRequest {
  string prompt = 1;
  LlmCallOptsPb opts = 2;
}
message AiProcessResponse { string text = 1; }

message AiRequestActionWithToolsRequest {
  string prompt = 1;
  ToolDefinitionsPb tools = 2;
  LlmCallOptsPb opts = 3;
}
// AiResponse JSON — reply / executedActions / blocks / toolResults / error 등 다형.
message AiRequestActionWithToolsResponse { string raw_json = 1; }

// ─── Streaming RPC — SSE chunk / step / result event ─────────────────────────
// 옛 TS Core 안 callback 두 개 (step + chunk) 박혀있던 영역. Rust core unary RPC 시점에
// SSE event 영역 0 박혀 thinking-style 진행 메시지 영역 안 보임. server-stream RPC 박힘.
//
// 이벤트:
//   - chunk: 매 turn AI 의 reasoning text 또는 thinking 영역 (도구 호출 사이 박힌 진행 메시지)
//   - step:  매 도구 호출 시작 / 완료 / 에러
//   - result: 최종 AiResponse JSON
//   - error:  치명적 에러 (stream 종료)
message AiChunkEventPb {
  string event_type = 1; // "text" | "thinking"
  string content = 2;
}
message AiStepEventPb {
  string name = 1;       // 도구 이름 (예: "save_page", "sysmod_notes")
  string status = 2;     // "start" | "done" | "error"
  optional string description = 3;
  optional string error_message = 4;
}
message AiResultEventPb {
  string raw_json = 1;   // AiResponse JSON (옛 unary RequestActionWithTools 응답 형태)
}
message AiErrorEventPb {
  string error_message = 1;
}
message AiStreamEventPb {
  oneof event {
    AiChunkEventPb chunk = 1;
    AiStepEventPb step = 2;
    AiResultEventPb result = 3;
    AiErrorEventPb error = 4;
  }
}

// streaming RPC 전용 Request — buf STANDARD lint (RPC_REQUEST_RESPONSE_UNIQUE) 영역 매 RPC 안
// unique Request 강제. 옛 AiRequestActionWithToolsRequest 영역 그대로 박혀있고 stream 안 별도.
message AiStreamRequestActionWithToolsRequest {
  string prompt = 1;
  ToolDefinitionsPb tools = 2;
  LlmCallOptsPb opts = 3;
}

message AiCodeAssistRequest {
  string prompt = 1;
  LlmCallOptsPb opts = 2;
}
message AiCodeAssistResponse { string text = 1; }

message AiRunAgentJobRequest {
  string job_id = 1;
  string agent_prompt = 2;
  optional string title = 3;
  optional string model = 4;
}
// {success, reply, executedActions, blocks, error}.
message AiRunAgentJobResponse { string raw_json = 1; }

message AiResolveCallTargetRequest { string identifier = 1; }
// {identifier, kind, note} — ToolDispatcher 풀 wiring 후 본격 활성.
message AiResolveCallTargetResponse { string raw_json = 1; }

message AiSpawnSubAgentRequest {
  string prompt = 1;
  optional string model = 2;
}
// AiResponse JSON.
message AiSpawnSubAgentResponse { string raw_json = 1; }

message AiIsSubAgentEnabledRequest {}
message AiIsSubAgentEnabledResponse { bool enabled = 1; }

message AiSetSubAgentEnabledRequest { bool enabled = 1; }
message AiSetSubAgentEnabledResponse {}

message AiCreatePendingRequest {
  string name = 1;
  string args_json = 2;
  string summary = 3;
}
message AiCreatePendingResponse { string plan_id = 1; }

message AiGetPendingRequest { string plan_id = 1; }
// PendingTool|null JSON. raw_json="null" 이면 미존재.
message AiGetPendingResponse { string raw_json = 1; }

message AiConsumePendingRequest { string plan_id = 1; }
// PendingTool|null JSON. raw_json="null" 이면 미존재.
message AiConsumePendingResponse { string raw_json = 1; }

message AiRejectPendingRequest { string plan_id = 1; }
// 해당 planId 가 실제 pending 으로 존재했는지 (false 면 이미 만료 / 없음).
message AiRejectPendingResponse { bool had = 1; }

message AiStorePlanRequest {
  string plan_id = 1;
  string title = 2;
  repeated PlanStepPb steps = 3;
  optional string estimated_time = 4;
  repeated string risks = 5;
}
message AiStorePlanResponse {}

service AiService {
  rpc Process(AiProcessRequest) returns (AiProcessResponse);
  rpc RequestActionWithTools(AiRequestActionWithToolsRequest) returns (AiRequestActionWithToolsResponse);
  // 진짜 streaming — 매 turn reasoning chunk / 도구 호출 step / 최종 result event 영역 server-stream.
  rpc StreamRequestActionWithTools(AiStreamRequestActionWithToolsRequest) returns (stream AiStreamEventPb);
  rpc CodeAssist(AiCodeAssistRequest) returns (AiCodeAssistResponse);
  rpc RunAgentJob(AiRunAgentJobRequest) returns (AiRunAgentJobResponse);
  rpc ResolveCallTarget(AiResolveCallTargetRequest) returns (AiResolveCallTargetResponse);
  rpc SpawnSubAgent(AiSpawnSubAgentRequest) returns (AiSpawnSubAgentResponse);
  rpc IsSubAgentEnabled(AiIsSubAgentEnabledRequest) returns (AiIsSubAgentEnabledResponse);
  rpc SetSubAgentEnabled(AiSetSubAgentEnabledRequest) returns (AiSetSubAgentEnabledResponse);

  // Pending tools — 승인 대기 도구 (옛 TS lib/pending-tools.ts 통합)
  rpc CreatePending(AiCreatePendingRequest) returns (AiCreatePendingResponse);
  rpc GetPending(AiGetPendingRequest) returns (AiGetPendingResponse);
  rpc ConsumePending(AiConsumePendingRequest) returns (AiConsumePendingResponse);
  rpc RejectPending(AiRejectPendingRequest) returns (AiRejectPendingResponse);

  // Plan store — propose_plan steps (옛 TS lib/plan-store.ts 통합)
  rpc StorePlan(AiStorePlanRequest) returns (AiStorePlanResponse);
}

// ─── StorageService typed Request / Response messages ──────────────────────
message StorageReadFileRequest { string path = 1; }
message StorageReadFileResponse { string raw_json = 1; }

message StorageReadFileBinaryRequest { string path = 1; }
message StorageReadFileBinaryResponse { string raw_json = 1; }

message StorageWriteFileRequest {
  string path = 1;
  string content = 2;
}
message StorageWriteFileResponse {}

message StorageDeleteFileRequest { string path = 1; }
message StorageDeleteFileResponse {}

message StorageListDirRequest { string path = 1; }
message StorageListDirResponse { string raw_json = 1; }

message StorageListFilesRequest { string path = 1; }
message StorageListFilesResponse { string raw_json = 1; }

message StorageGetFileTreeRequest { string path = 1; }
message StorageGetFileTreeResponse { string raw_json = 1; }

message StorageGlobFilesRequest {
  string pattern = 1;
  optional int64 limit = 2;
}
message StorageGlobFilesResponse { string raw_json = 1; }

// ──────────────────────────────────────────────────────────────────────────
// 2. StorageService — StorageManager
// ──────────────────────────────────────────────────────────────────────────
service StorageService {
  rpc ReadFile(StorageReadFileRequest) returns (StorageReadFileResponse);
  rpc ReadFileBinary(StorageReadFileBinaryRequest) returns (StorageReadFileBinaryResponse);
  rpc WriteFile(StorageWriteFileRequest) returns (StorageWriteFileResponse);
  rpc DeleteFile(StorageDeleteFileRequest) returns (StorageDeleteFileResponse);
  rpc ListDir(StorageListDirRequest) returns (StorageListDirResponse);
  rpc ListFiles(StorageListFilesRequest) returns (StorageListFilesResponse);
  rpc GetFileTree(StorageGetFileTreeRequest) returns (StorageGetFileTreeResponse);
  rpc GlobFiles(StorageGlobFilesRequest) returns (StorageGlobFilesResponse);
}

// ─── PageService typed messages ──────────────────────────────────────────────

message PageListItemPb {
  string slug = 1;
  string status = 2;
  optional string project = 3;
  optional string visibility = 4;
  optional string title = 5;
  int64 updated_at = 6;
  int64 created_at = 7;
  optional string featured_image = 8;
  optional string excerpt = 9;
}

message PageListResponse {
  repeated PageListItemPb items = 1;
}

message PageSearchResponse {
  repeated PageListItemPb items = 1;
}

message PageFindRelatedResponse {
  repeated PageListItemPb items = 1;
}

message PageRecordPb {
  string slug = 1;
  string spec = 2;
  string status = 3;
  optional string project = 4;
  optional string visibility = 5;
  optional string password = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message PageSaveResultPb {
  bool ok = 1;
  string slug = 2;
  optional string error = 3;
}

/** get_redirect: Some(url) → value set; None → value empty. */
message OptionalStringPb {
  string value = 1;
  bool present = 2;
}

message StringListPb {
  repeated string values = 1;
}

message MediaUsageEntryPb {
  string page_slug = 1;
  int64 used_at = 2;
}

message MediaUsageListPb {
  repeated MediaUsageEntryPb entries = 1;
}

message TagSummaryPb {
  string tag = 1;
  int64 count = 2;
  repeated string slugs = 3;
}

message TagListPb {
  repeated TagSummaryPb tags = 1;
}

// ─── PageService typed Request / Response messages ─────────────────────────
// 2026-05-15 buf STANDARD 정공 — 매 RPC 마다 unique Request / Response message.
// 옛 공유 타입 (Empty / StringRequest / BoolRequest / OptionalStringPb / StringListPb) 폐기.

message PageListRequest {}
message PageSearchRequest {
  string query = 1;
  optional int64 limit = 2;
}
message PageGetRequest {
  string slug = 1;
}
message PageSaveRequest {
  string slug = 1;
  string spec = 2;
  optional string status = 3;       // 미지정 시 "published" default
  optional string project = 4;
  optional string visibility = 5;
  optional string password = 6;
}
message PageDeleteRequest {
  string slug = 1;
}
message PageDeleteResponse {}
message PageRenameRequest {
  string old_slug = 1;
  string new_slug = 2;
  optional bool set_redirect = 3;
}
message PageRenameResponse {}
message PageGetRedirectRequest {
  string slug = 1;
}
message PageGetRedirectResponse {
  string value = 1;
  bool present = 2;
}
message PageListStaticRequest {}
message PageListStaticResponse {
  repeated string slugs = 1;
}
message PageFindMediaUsageRequest {
  string media_slug = 1;
}
message PageSetVisibilityRequest {
  string slug = 1;
  string visibility = 2;
  optional string password = 3;
}
message PageSetVisibilityResponse {}
message PageVerifyPasswordRequest {
  string slug = 1;
  string password = 2;
}
message PageVerifyPasswordResponse {
  bool valid = 1;
}
message PageFindRelatedRequest {
  string slug = 1;
  optional int64 limit = 2;
  // CMS settings.tagAliases textarea — 옛 패턴 1:1.
  optional string tag_aliases_raw = 3;
}
message PageListAllTagsRequest {}

// ──────────────────────────────────────────────────────────────────────────
// 3. PageService — PageManager
// ──────────────────────────────────────────────────────────────────────────
service PageService {
  rpc List(PageListRequest) returns (PageListResponse);
  rpc Search(PageSearchRequest) returns (PageSearchResponse);
  rpc Get(PageGetRequest) returns (PageRecordPb);
  rpc Save(PageSaveRequest) returns (PageSaveResultPb);
  rpc Delete(PageDeleteRequest) returns (PageDeleteResponse);
  rpc Rename(PageRenameRequest) returns (PageRenameResponse);
  rpc GetRedirect(PageGetRedirectRequest) returns (PageGetRedirectResponse);
  rpc ListStatic(PageListStaticRequest) returns (PageListStaticResponse);
  rpc FindMediaUsage(PageFindMediaUsageRequest) returns (MediaUsageListPb);
  rpc SetVisibility(PageSetVisibilityRequest) returns (PageSetVisibilityResponse);
  rpc VerifyPassword(PageVerifyPasswordRequest) returns (PageVerifyPasswordResponse);
  rpc FindRelated(PageFindRelatedRequest) returns (PageFindRelatedResponse);
  rpc ListAllTags(PageListAllTagsRequest) returns (TagListPb);
}

// ─── ProjectService typed messages ───────────────────────────────────────────

message ProjectEntryPb {
  string name = 1;
  repeated string paths = 2;
  repeated string page_slugs = 3;
  string visibility = 4;   // "public" | "password" | "private"
}

message ProjectListPb {
  repeated ProjectEntryPb projects = 1;
}

message ProjectVisibilityPb {
  string visibility = 1;   // "public" | "password" | "private"
}

/** project config.json 내용 — 동적 JSON, raw string 으로 직렬화. */
message ProjectConfigPb {
  string raw_json = 1;
}

// ─── ProjectService typed Request / Response messages ──────────────────────
// 2026-05-15 buf STANDARD 정공 — 매 RPC 마다 unique Request / Response message.
message ProjectScanRequest {
  // 빈 string = admin scope, 값 = hub instance id (`user/hub/<id>/modules/...` + project='hub:<id>' page)
  optional string hub_id = 1;
}
message ProjectSetVisibilityRequest {
  string project = 1;
  string visibility = 2;
  optional string password = 3;
}
message ProjectSetVisibilityResponse {}
message ProjectGetVisibilityRequest {
  string project = 1;
}
message ProjectGetConfigRequest {
  string project = 1;
}
message ProjectSetConfigRequest {
  string project = 1;
  string config_json = 2;
}
message ProjectSetConfigResponse {}
message ProjectVerifyPasswordRequest {
  string project = 1;
  string password = 2;
}
message ProjectVerifyPasswordResponse {
  bool valid = 1;
}
message ProjectDeleteRequest {
  string project = 1;
}
message ProjectDeleteResponse {}
message ProjectRenameRequest {
  string old_name = 1;
  string new_name = 2;
}
message ProjectRenameResponse {}

// ──────────────────────────────────────────────────────────────────────────
// 4. ProjectService — ProjectManager
// ──────────────────────────────────────────────────────────────────────────
service ProjectService {
  rpc Scan(ProjectScanRequest) returns (ProjectListPb);
  rpc SetVisibility(ProjectSetVisibilityRequest) returns (ProjectSetVisibilityResponse);
  rpc GetVisibility(ProjectGetVisibilityRequest) returns (ProjectVisibilityPb);
  rpc GetConfig(ProjectGetConfigRequest) returns (ProjectConfigPb);
  rpc SetConfig(ProjectSetConfigRequest) returns (ProjectSetConfigResponse);
  rpc VerifyPassword(ProjectVerifyPasswordRequest) returns (ProjectVerifyPasswordResponse);
  rpc Delete(ProjectDeleteRequest) returns (ProjectDeleteResponse);
  rpc Rename(ProjectRenameRequest) returns (ProjectRenameResponse);
}

// ─── ModuleService typed Request / Response messages ───────────────────────
message ModuleRunRequest {
  // path 형태 (`system/modules/xxx/main.py`) 면 직접 경로 실행. 단순 이름 (`xxx`) 면 entry 자동 탐색.
  string module = 1;
  // 모듈 입력 (동적 schema) — JSON 직렬화 raw.
  string data_json = 2;
}
message ModuleListSystemRequest {}
message ModuleListUserRequest {}
message ModuleGetSchemaRequest {
  string scope = 1;
  string name = 2;
}
message ModuleGetSchemaResponse {
  // ModuleConfig JSON (옛 RawJsonPb 1:1).
  string raw_json = 1;
}
message ModuleGetSettingsRequest {
  string name = 1;
}
message ModuleGetSettingsResponse {
  // Settings 객체 JSON.
  string raw_json = 1;
}
message ModuleGetConfigRequest {
  string name = 1;
}
message ModuleGetConfigResponse {
  // Config 객체 JSON (any-scope 자동 탐색).
  string raw_json = 1;
}
message ModuleSetSettingsRequest {
  string name = 1;
  string settings_json = 2;
}
message ModuleSetSettingsResponse {}
message ModuleIsEnabledRequest {
  string name = 1;
}
message ModuleIsEnabledResponse {
  bool enabled = 1;
}
message ModuleSetEnabledRequest {
  string name = 1;
  bool enabled = 2;
}
message ModuleSetEnabledResponse {}
message ModuleGetCmsSettingsRequest {}
message ModuleGetCmsSettingsResponse {
  // CMS settings (default + stored merge) JSON.
  string raw_json = 1;
}
message ModuleGetLangRequest {
  string name = 1;
  // 'ko' / 'en' — 미지정 시 'en' fallback.
  string lang = 2;
}
message ModuleGetLangResponse {
  // lang/{lang}.json 파일 객체 JSON. 미존재 시 "{}".
  string raw_json = 1;
}
message ModuleGetKakaoMapJsKeyRequest {}
message ModuleGetKakaoMapJsKeyResponse {
  // CMS settings 의 kakaoMapJsKey — 없으면 빈 string.
  string key = 1;
}

// ──────────────────────────────────────────────────────────────────────────
// 5. ModuleService — ModuleManager
// ──────────────────────────────────────────────────────────────────────────
service ModuleService {
  rpc Run(ModuleRunRequest) returns (ModuleOutputPb);
  rpc ListSystem(ModuleListSystemRequest) returns (ModuleListSystemResponse);
  rpc ListUser(ModuleListUserRequest) returns (ModuleListUserResponse);
  rpc GetSchema(ModuleGetSchemaRequest) returns (ModuleGetSchemaResponse);
  rpc GetSettings(ModuleGetSettingsRequest) returns (ModuleGetSettingsResponse);
  rpc GetConfig(ModuleGetConfigRequest) returns (ModuleGetConfigResponse);
  rpc SetSettings(ModuleSetSettingsRequest) returns (ModuleSetSettingsResponse);
  rpc IsEnabled(ModuleIsEnabledRequest) returns (ModuleIsEnabledResponse);
  rpc SetEnabled(ModuleSetEnabledRequest) returns (ModuleSetEnabledResponse);
  rpc GetCmsSettings(ModuleGetCmsSettingsRequest) returns (ModuleGetCmsSettingsResponse);
  rpc GetLang(ModuleGetLangRequest) returns (ModuleGetLangResponse);
  rpc GetKakaoMapJsKey(ModuleGetKakaoMapJsKeyRequest) returns (ModuleGetKakaoMapJsKeyResponse);
  // 패키지 install — 매 패키지 background spawn + StatusManager job. silent install 폐기 후
  // 사용자 명시 trigger (설정 화면 [설치] / [업그레이드] 버튼) 박은 path. 2026-05-16.
  rpc InstallPackages(ModuleInstallPackagesRequest) returns (ModuleInstallPackagesResponse);
  rpc GetPackageStatus(ModuleGetPackageStatusRequest) returns (ModuleGetPackageStatusResponse);
}

/** 임의 JSON 직렬화 blob — 동적 스키마 / 설정값 전달용. raw_json = JSON 문자열 (null 이면 "null"). */
message RawJsonPb {
  string raw_json = 1;
}

/** ModuleOutput — sysmod sandbox 실행 결과. */
message ModuleOutputPb {
  bool success = 1;
  optional string data_json = 2;
  optional string error = 3;
  optional string stderr = 4;
  optional int32 exit_code = 5;
  string protocol_version = 6;
  /// i18n key — `core.module.packages_missing` / `module.{name}.X.Y` 형태. SysmodToolHandler / Frontend 가 lookup 변환.
  optional string error_key = 7;
  /// i18n placeholder param — `{{name}}` 치환. JSON object string (frontend 가 parse).
  optional string error_params_json = 8;
}

/** ModuleEntry (SystemEntry) — 시스템·유저 모듈/서비스 항목. */
message ModuleEntryPb {
  string name = 1;
  string description = 2;
  string runtime = 3;
  string entry_type = 4;
  string scope = 5;
  bool enabled = 6;
}

message ModuleListSystemResponse {
  repeated ModuleEntryPb entries = 1;
}

message ModuleListUserResponse {
  repeated ModuleEntryPb entries = 1;
}

/** Sysmod 패키지 status — 설정 화면 [설치] / [업그레이드] 버튼 UI + 진행 상태 polling. */
message PackageStatusPb {
  string name = 1;
  /// "installed" | "missing" | "in_progress" | "failed".
  string status = 2;
  optional string job_id = 3;
  optional string error = 4;
  /// 디스크 안 dist-info 추출 버전 (예: "2.32.3"). 미설치 / 추출 실패 시 비어있음. 참고용 표시만.
  optional string installed_version = 5;
  /// config.json 안 `==X.Y.Z` 명시 버전. 다른 specifier (>=, ~= 등) 박힌 영역 비어있음.
  optional string required_version = 6;
  /// 업그레이드 가능 — PyPI latest > config 명시 버전 인 경우만 true.
  /// frontend [업그레이드] 버튼 표시 조건.
  bool upgrade_available = 7;
  /// PyPI registry 안 최신 stable 버전 — `https://pypi.org/pypi/<pkg>/json` 조회. 1시간 캐시.
  /// 네트워크 실패 / 미설치 패키지 = 비어있음.
  optional string latest_version = 8;
}

message ModuleInstallPackagesRequest {
  string module = 1;
  /// true 시 `pip install --upgrade` — 이미 설치된 패키지를 최신 버전으로 갱신.
  bool upgrade = 2;
}

message ModuleInstallPackagesResponse {
  /// 새로 시작한 StatusManager job_id 목록 (이미 설치 / 진행 중 패키지는 제외).
  repeated string job_ids = 1;
}

message ModuleGetPackageStatusRequest {
  string module = 1;
}

message ModuleGetPackageStatusResponse {
  repeated PackageStatusPb packages = 1;
}

// ─── TaskService typed Request / Response messages ─────────────────────────
message TaskRunRequest {
  // 파이프라인 step 배열 — 동적 schema. JSON 직렬화 raw.
  string pipeline_json = 1;
}
/** Pipeline 실행 결과 — TaskRunResponse 별칭 (옛 PipelineResultPb 1:1). */
message TaskRunResponse {
  bool success = 1;
  optional string data_json = 2;
  optional string error = 3;
}

// ──────────────────────────────────────────────────────────────────────────
// 6. TaskService — TaskManager
// ──────────────────────────────────────────────────────────────────────────
service TaskService {
  rpc Run(TaskRunRequest) returns (TaskRunResponse);
}

/**
 * Cron RunWhen — 사전 조건 평가 (sysmod 호출 결과 의 field 비교).
 * 2026-05-13 A1-full Phase typed (옛 JSON Value 폐기).
 */
message CronRunWhenPb {
  CronRunWhenCheckPb check = 1;
  string field = 2;
  string op = 3;
  optional string value_json = 4;  // 동적 type (string/number/bool) — JSON string. truthy 등은 미설정.
}

message CronRunWhenCheckPb {
  string sysmod = 1;
  string action = 2;
  optional string input_data_json = 3;  // sysmod inputData — 동적 schema JSON string.
}

/**
 * Cron Retry — 실패 시 retry 정책. 2026-05-13 typed 박힘.
 */
message CronRetryPb {
  int64 count = 1;
  optional int64 delay_ms = 2;
}

/**
 * Cron Notify — 성공/실패 시 sysmod 호출 hook. 2026-05-13 typed 박힘.
 */
message CronNotifyPb {
  optional CronNotifyHookPb on_success = 1;
  optional CronNotifyHookPb on_error = 2;
}

message CronNotifyHookPb {
  string sysmod = 1;
  optional string template = 2;
  optional string chat_id = 3;
}

/** CronJobInfo — options 의 동적 JSON 필드(pipeline/inputData/runWhen/retry/notify)는 JSON 문자열. */
message CronJobPb {
  string job_id = 1;
  string target_path = 2;
  string mode = 3;
  string created_at = 4;
  optional string cron_time = 5;
  optional string run_at = 6;
  optional int64 delay_sec = 7;
  optional string start_at = 8;
  optional string end_at = 9;
  optional string input_data_json = 10;
  optional string pipeline_json = 11;
  optional string title = 12;
  optional string description = 13;
  optional bool one_shot = 14;
  optional string run_when_json = 15;
  optional string retry_json = 16;
  optional string notify_json = 17;
  optional string execution_mode = 18;
  optional string agent_prompt = 19;
  // 빈 string = admin (default), "hub:<id>" = hub visitor 소유.
  optional string owner = 20;
}

message CronJobListPb {
  repeated CronJobPb jobs = 1;
}

message CronLogEntryPb {
  string job_id = 1;
  string target_path = 2;
  optional string title = 3;
  string triggered_at = 4;
  bool success = 5;
  int64 duration_ms = 6;
  optional string error = 7;
  optional string output_json = 8;
  optional int64 steps_executed = 9;
  optional int64 steps_total = 10;
}

message CronLogListPb {
