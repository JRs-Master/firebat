  rpc Remove(MediaRemoveRequest) returns (MediaRemoveResponse);
  rpc IsReady(MediaIsReadyRequest) returns (MediaIsReadyResponse);
  rpc StartGeneration(MediaStartGenerationRequest) returns (StartGenerationPb);
  rpc Generate(MediaGenerateRequest) returns (MediaGenerateResponse);
  rpc Regenerate(MediaRegenerateRequest) returns (MediaRegenerateResponse);
  rpc Save(MediaSaveRequest) returns (MediaSaveResultPb);
  rpc GetImageModel(MediaGetImageModelRequest) returns (MediaGetImageModelResponse);
  rpc SetImageModel(MediaSetImageModelRequest) returns (MediaSetImageModelResponse);
  rpc GetAvailableImageModels(MediaGetAvailableImageModelsRequest) returns (ImageModelListPb);
  rpc GetImageDefaultSize(MediaGetImageDefaultSizeRequest) returns (MediaGetImageDefaultSizeResponse);
  rpc SetImageDefaultSize(MediaSetImageDefaultSizeRequest) returns (MediaSetImageDefaultSizeResponse);
  rpc GetImageDefaultQuality(MediaGetImageDefaultQualityRequest) returns (MediaGetImageDefaultQualityResponse);
  rpc SetImageDefaultQuality(MediaSetImageDefaultQualityRequest) returns (MediaSetImageDefaultQualityResponse);
  rpc GetImageSettings(MediaGetImageSettingsRequest) returns (ImageSettingsPb);
  /// 채팅 첨부 이미지 임시 저장 — sharp 0 (raw 그대로). /user/attachments/<slug>.<ext> 응답.
  /// 30일 후 cleanup cron 이 자동 삭제. 사용자 명시 갤러리 저장 (Save) 은 별도.
  /// Response: {slug, url}.
  rpc SaveTempAttachment(MediaSaveTempAttachmentRequest) returns (MediaSaveTempAttachmentResponse);
  /// 30일 retention cleanup — 임시 첨부 영역 (user/attachments/) 의 오래된 파일 삭제.
  /// internal cron 이 6h 마다 호출.
  rpc CleanupOldAttachments(MediaCleanupOldAttachmentsRequest) returns (MediaCleanupOldAttachmentsResponse);
  /// 채팅 첨부 read — `/user/attachments/<filename>` URL handler 가 호출. binary + content_type 반환.
  rpc ReadTempAttachment(MediaReadTempAttachmentRequest) returns (MediaReadTempAttachmentResponse);
}

