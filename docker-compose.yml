# Phase C self-hosted Docker compose — Firebat v1.0 Final.
#
# 구성:
#  - firebat-core (Rust) — gRPC :50051 (모든 도메인 RPC) + MCP HTTP :50052 (60+ 도구) + sysmod / DB / Vault / cron.
#  - firebat-renderer (Next.js standalone, port 3000) — 어드민 / 사용자 UI. `/api/mcp*` route 는 firebat-core:50052 reverse proxy.
#  - caddy (port 80/443) — 자동 TLS (Let's Encrypt) + reverse proxy + HTTP/3.
#
# Volume mount:
#  - ./data → /opt/firebat/data (SQLite DB / Vault / cron jobs / 영속 잡)
#  - ./user → /opt/firebat/user (사용자 모듈 / 미디어 / 첨부)
#  - ./system → /opt/firebat/system (시스템 모듈 / 미디어)
#
# 운영 명령:
#  docker compose up -d --build       # 빌드 + 데몬 실행
#  docker compose logs -f firebat-core
#  docker compose down                # graceful shutdown (SIGTERM → 30초 대기)
#  docker compose restart firebat-core
#  docker compose pull && docker compose up -d --build   # 코드 update 후 재시작
#
# 새 서버 cutover 절차 (옛 systemd 운영 → 새 Docker compose):
#  ./scripts/migrate-v0-to-v1.sh   # 자동 (옛 데이터 백업 + 권한 + 빌드 + 시작)

services:
  firebat-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    image: firebat-core:latest
    container_name: firebat-core
    restart: unless-stopped
    stop_grace_period: 30s   # SIGTERM 후 graceful shutdown 시간
    environment:
      FIREBAT_WORKSPACE_ROOT: /opt/firebat
      FIREBAT_CORE_LISTEN: 0.0.0.0:50051
      # MCP HTTP server (Phase E) — renderer 의 /api/mcp* route 가 reverse proxy 대상.
      FIREBAT_MCP_ENABLED: "true"
      FIREBAT_MCP_LISTEN: 0.0.0.0:50052
      FIREBAT_TIMEZONE: Asia/Seoul
      FIREBAT_DEFAULT_MODEL: claude-sonnet-4-6
      # Container 자체가 격리 — LinuxCgroupsSandboxAdapter 무관. main.rs:140 의 분기로 BasicProcessSandbox.
      FIREBAT_SANDBOX: basic
      RUST_LOG: info
      RUST_BACKTRACE: "1"
    volumes:
      - ./data:/opt/firebat/data
      - ./user:/opt/firebat/user
      - ./system:/opt/firebat/system
    ports:
      # 외부 노출 안 함 — renderer 만 compose network 안에서 접근. 호스트 디버깅 시점 127.0.0.1 binding.
      - "127.0.0.1:50051:50051"
      - "127.0.0.1:50052:50052"
    networks:
      - firebat-net
    healthcheck:
      test: ["CMD-SHELL", "ls /proc/1/exe || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  firebat-renderer:
    build:
      context: .
      dockerfile: Dockerfile.renderer
    image: firebat-renderer:latest
    container_name: firebat-renderer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Renderer 의 gRPC 호출 대상 — compose network 안 firebat-core 서비스명 으로 DNS 해석.
      FIREBAT_CORE_GRPC: firebat-core:50051
      # MCP HTTP server (Rust :50052) reverse proxy 대상 — /api/mcp 및 /api/mcp-internal route 가 사용.
      FIREBAT_MCP_BASE_URL: http://firebat-core:50052
      FIREBAT_MCP_PATH: /mcp
    volumes:
      # MCP server 가 system/modules 안 config.json 스캔 — renderer 도 system 디렉토리 접근.
      - ./system:/app/system:ro
      - ./user:/app/user:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      firebat-core:
        condition: service_healthy
    networks:
      - firebat-net

  caddy:
    image: caddy:2-alpine
    container_name: firebat-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./user/media:/opt/firebat/user/media:ro
      - ./system/media:/opt/firebat/system/media:ro
      - caddy-data:/data         # Let's Encrypt cert 영속 — 절대 잃으면 안 됨 (rate limit 위험)
      - caddy-config:/config
      - ./data/logs/caddy:/var/log/caddy
    depends_on:
      - firebat-renderer
    networks:
      - firebat-net

networks:
  firebat-net:
    driver: bridge

volumes:
  caddy-data:    # Let's Encrypt cert + ACME state — 잃으면 rate limit 위험
  caddy-config:
