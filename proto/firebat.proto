// ──────────────────────────────────────────────────────────────────────────
// Phase B 진행 시 변환 룰:
//  1. JsonArgs / JsonValue → 매니저별 typed message 로 swap
//  2. tonic-build 가 Rust 구조체 자동 생성
//  3. TS client (lib/core-client.ts) 도 generated stub 활용 — typed 안전 보장
//  4. service 단위 dual-run 검증 (옛 Node 결과 vs Rust 결과 diff)
// ──────────────────────────────────────────────────────────────────────────
