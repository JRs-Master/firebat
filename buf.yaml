version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    - SERVICE_SUFFIX
    - FIELD_LOWER_SNAKE_CASE
    - PACKAGE_DIRECTORY_MATCH
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    # RPC unique message 룰 — 매 RPC 마다 별도 Request/Response message 박는 게 buf STANDARD 정공.
    # 다만 Firebat 의 공유 타입 (StringRequest / BoolRequest / NumberRequest / Empty / RawJsonPb /
    # OptionalStringPb) 박힌 영역 많음. 별도 sprint 로 점진 unique message 박기 — 그 때까지 lint pass.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
