// Firebat Core gRPC schema (v1.0 Final Phase A — skeleton + service 분리).
//
// Phase A: 21 매니저 + cross-cutting service skeleton 정의. RPC list 작성.
//          message body 는 JsonValue 단일화 — Phase B 에서 매니저별 typed message 로 점진 변환.
// Phase B: 각 매니저 Rust 구현하면서 typed request/response 정의.
//
// 사용 path:
//  - Rust Core: tonic-build (build.rs) 가 .proto 컴파일 → src/proto/ 자동 생성
//  - TS client (lib/core-client.ts 의 'rust' backend): @grpc/grpc-js + protoc-gen-ts
//
// 21 매니저:
//   AiManager / StorageManager / PageManager / ProjectManager / ModuleManager
//   TaskManager / ScheduleManager / SecretManager / McpManager / CapabilityManager
//   AuthManager / ConversationManager / MediaManager / EventManager / StatusManager
//   CostManager / ToolManager / EntityManager / EpisodicManager / ConsolidationManager / TemplateManager
//
// Cross-cutting (Core facade 직속): Settings / Network / Cache / Telegram / Database / Lifecycle / Memory file

syntax = "proto3";

package firebat.v1;

// ──────────────────────────────────────────────────────────────────────────
// 공통 타입
// ──────────────────────────────────────────────────────────────────────────

message Empty {}

/** RPC 응답의 ok / error 표준 */
message Status {
  bool ok = 1;
  string error = 2;
  string error_code = 3;
}

/** Phase A: typed message 정의 전 사용. JSON 직렬화 string. Phase B 에서 매니저별 typed 로 swap. */
message JsonValue {
  string raw = 1;
}

/** 인자 0~N 개 — JsonValue 배열. 단일 객체면 raw=JSON 문자열, 다인자면 array. */
message JsonArgs {
  string raw = 1;
}

/** ID 단일 인자 — string 또는 number 허용 */
message IdRequest {
  string id = 1;
}

message StringRequest { string value = 1; }
message NumberRequest { int64 value = 1; }
message BoolRequest { bool value = 1; }

/** 헬스 / 버전 정보 */
message HealthInfo {
  string version = 1;
  int64 uptime_ms = 2;
  bool ready = 3;
  repeated string active_managers = 4;
}

// ──────────────────────────────────────────────────────────────────────────
// 1. AiService — AiManager
//   process / requestActionWithTools / codeAssist / runAgentJob / resolveCallTarget /
//   spawnSubAgent / isSubAgentEnabled / setSubAgentEnabled
// ──────────────────────────────────────────────────────────────────────────
// AiService typed messages
message AiTextResultPb {
  string text = 1;
}

/** LlmCallOpts — 옵션 전달 (model / temperature / system_prompt / mcp_token 등 다수 field).
    동적 schema 라 JSON 문자열 raw 으로 직렬화. Rust 가 serde_json::from_str 으로 LlmCallOpts struct 로 deserialize. */
message LlmCallOptsPb {
  string opts_json = 1;
}

/** ToolDefinition list — 도구 schema 배열. 동적 JSON. */
message ToolDefinitionsPb {
  string tools_json = 1;
}

/** PendingTool entry — args 는 임의 JSON. */
message PendingToolPb {
  string name = 1;
  string args_json = 2;
  string summary = 3;
}

/** propose_plan step — 동적 schema (EXECUTE / MCP_CALL / NETWORK_REQUEST 등). */
message PlanStepPb {
  string step_json = 1;
}

// Typed Request messages — AiService
message AiProcessRequest {
  string prompt = 1;
  LlmCallOptsPb opts = 2;
}
message AiRequestActionWithToolsRequest {
  string prompt = 1;
  ToolDefinitionsPb tools = 2;
  LlmCallOptsPb opts = 3;
}
message AiCodeAssistRequest {
  string prompt = 1;
  LlmCallOptsPb opts = 2;
}
message AiRunAgentJobRequest {
  string job_id = 1;
  string agent_prompt = 2;
  optional string title = 3;
  optional string model = 4;
}
message AiSpawnSubAgentRequest {
  string prompt = 1;
  optional string model = 2;
}
message AiCreatePendingRequest {
  string name = 1;
  string args_json = 2;
  string summary = 3;
}
message AiStorePlanRequest {
  string plan_id = 1;
  string title = 2;
  repeated PlanStepPb steps = 3;
  optional string estimated_time = 4;
  repeated string risks = 5;
}

service AiService {
  rpc Process(AiProcessRequest) returns (AiTextResultPb);
  rpc RequestActionWithTools(AiRequestActionWithToolsRequest) returns (RawJsonPb);
  rpc CodeAssist(AiCodeAssistRequest) returns (AiTextResultPb);
  rpc RunAgentJob(AiRunAgentJobRequest) returns (RawJsonPb);
  rpc ResolveCallTarget(StringRequest) returns (RawJsonPb);
  rpc SpawnSubAgent(AiSpawnSubAgentRequest) returns (RawJsonPb);
  rpc IsSubAgentEnabled(Empty) returns (BoolRequest);
  rpc SetSubAgentEnabled(BoolRequest) returns (Status);

  // Pending tools — 승인 대기 도구 (옛 TS lib/pending-tools.ts 통합)
  rpc CreatePending(AiCreatePendingRequest) returns (StringRequest);   // → planId
  rpc GetPending(StringRequest) returns (RawJsonPb);      // planId → PendingTool|null
  rpc ConsumePending(StringRequest) returns (RawJsonPb);  // planId → PendingTool|null
  rpc RejectPending(StringRequest) returns (BoolRequest); // planId → had

  // Plan store — propose_plan steps (옛 TS lib/plan-store.ts 통합)
  rpc StorePlan(AiStorePlanRequest) returns (Empty);
}

// ─── StorageService typed Request messages ──────────────────────────────────
message StorageWriteFileRequest {
  string path = 1;
  string content = 2;
}
message StorageGlobFilesRequest {
  string pattern = 1;
  optional int64 limit = 2;
}

// ──────────────────────────────────────────────────────────────────────────
// 2. StorageService — StorageManager
// ──────────────────────────────────────────────────────────────────────────
service StorageService {
  rpc ReadFile(StringRequest) returns (RawJsonPb);
  rpc ReadFileBinary(StringRequest) returns (RawJsonPb);
  rpc WriteFile(StorageWriteFileRequest) returns (Status);
  rpc DeleteFile(StringRequest) returns (Status);
  rpc ListDir(StringRequest) returns (RawJsonPb);
  rpc ListFiles(StringRequest) returns (RawJsonPb);
  rpc GetFileTree(StringRequest) returns (RawJsonPb);
  rpc GlobFiles(StorageGlobFilesRequest) returns (RawJsonPb);
}

// ─── PageService typed messages ──────────────────────────────────────────────

message PageListItemPb {
  string slug = 1;
  string status = 2;
  optional string project = 3;
  optional string visibility = 4;
  optional string title = 5;
  int64 updated_at = 6;
  int64 created_at = 7;
  optional string featured_image = 8;
  optional string excerpt = 9;
}

message PageListResponsePb {
  repeated PageListItemPb items = 1;
}

message PageRecordPb {
  string slug = 1;
  string spec = 2;
  string status = 3;
  optional string project = 4;
  optional string visibility = 5;
  optional string password = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message PageSaveResultPb {
  bool ok = 1;
  string slug = 2;
  optional string error = 3;
}

/** get_redirect: Some(url) → value set; None → value empty. */
message OptionalStringPb {
  string value = 1;
  bool present = 2;
}

message StringListPb {
  repeated string values = 1;
}

message MediaUsageEntryPb {
  string page_slug = 1;
  int64 used_at = 2;
}

message MediaUsageListPb {
  repeated MediaUsageEntryPb entries = 1;
}

message TagSummaryPb {
  string tag = 1;
  int64 count = 2;
  repeated string slugs = 3;
}

message TagListPb {
  repeated TagSummaryPb tags = 1;
}

// ─── PageService typed Request messages ─────────────────────────────────────
message PageSearchRequest {
  string query = 1;
  optional int64 limit = 2;
}
message PageSaveRequest {
  string slug = 1;
  string spec = 2;
  optional string status = 3;       // 미지정 시 "published" default
  optional string project = 4;
  optional string visibility = 5;
  optional string password = 6;
}
message PageRenameRequest {
  string old_slug = 1;
  string new_slug = 2;
  optional bool set_redirect = 3;
}
message PageSetVisibilityRequest {
  string slug = 1;
  string visibility = 2;
  optional string password = 3;
}
message PageVerifyPasswordRequest {
  string slug = 1;
  string password = 2;
}
message PageFindRelatedRequest {
  string slug = 1;
  optional int64 limit = 2;
  // CMS settings.tagAliases textarea — 옛 패턴 1:1.
  optional string tag_aliases_raw = 3;
}

// ──────────────────────────────────────────────────────────────────────────
// 3. PageService — PageManager
// ──────────────────────────────────────────────────────────────────────────
service PageService {
  rpc List(Empty) returns (PageListResponsePb);
  rpc Search(PageSearchRequest) returns (PageListResponsePb);
  rpc Get(StringRequest) returns (PageRecordPb);
  rpc Save(PageSaveRequest) returns (PageSaveResultPb);
  rpc Delete(StringRequest) returns (Status);
  rpc Rename(PageRenameRequest) returns (Status);
  rpc GetRedirect(StringRequest) returns (OptionalStringPb);
  rpc ListStatic(Empty) returns (StringListPb);
  rpc FindMediaUsage(StringRequest) returns (MediaUsageListPb);
  rpc SetVisibility(PageSetVisibilityRequest) returns (Status);
  rpc VerifyPassword(PageVerifyPasswordRequest) returns (BoolRequest);
  rpc FindRelated(PageFindRelatedRequest) returns (PageListResponsePb);
  rpc ListAllTags(Empty) returns (TagListPb);
}

// ─── ProjectService typed messages ───────────────────────────────────────────

message ProjectEntryPb {
  string name = 1;
  repeated string paths = 2;
  repeated string page_slugs = 3;
  string visibility = 4;   // "public" | "password" | "private"
}

message ProjectListPb {
  repeated ProjectEntryPb projects = 1;
}

message ProjectVisibilityPb {
  string visibility = 1;   // "public" | "password" | "private"
}

/** project config.json 내용 — 동적 JSON, raw string 으로 직렬화. */
message ProjectConfigPb {
  string raw_json = 1;
}

// ─── ProjectService typed Request messages ──────────────────────────────────
message ProjectSetVisibilityRequest {
  string project = 1;
  string visibility = 2;
  optional string password = 3;
}
message ProjectSetConfigRequest {
  string project = 1;
  string config_json = 2;
}
message ProjectVerifyPasswordRequest {
  string project = 1;
  string password = 2;
}
message ProjectRenameRequest {
  string old_name = 1;
  string new_name = 2;
}

// ──────────────────────────────────────────────────────────────────────────
// 4. ProjectService — ProjectManager
// ──────────────────────────────────────────────────────────────────────────
service ProjectService {
  rpc Scan(Empty) returns (ProjectListPb);
  rpc SetVisibility(ProjectSetVisibilityRequest) returns (Status);
  rpc GetVisibility(StringRequest) returns (ProjectVisibilityPb);
  rpc GetConfig(StringRequest) returns (ProjectConfigPb);
  rpc SetConfig(ProjectSetConfigRequest) returns (Status);
  rpc VerifyPassword(ProjectVerifyPasswordRequest) returns (BoolRequest);
  rpc Delete(StringRequest) returns (Status);
  rpc Rename(ProjectRenameRequest) returns (Status);
}

// ─── ModuleService typed Request messages ───────────────────────────────────
message ModuleRunRequest {
  // path 형태 (`system/modules/xxx/main.py`) 면 직접 경로 실행. 단순 이름 (`xxx`) 면 entry 자동 탐색.
  string module = 1;
  // 모듈 입력 (동적 schema) — JSON 직렬화 raw.
  string data_json = 2;
}
message ModuleGetSchemaRequest {
  string scope = 1;
  string name = 2;
}
message ModuleSetSettingsRequest {
  string name = 1;
  string settings_json = 2;
}
message ModuleSetEnabledRequest {
  string name = 1;
  bool enabled = 2;
}

// ──────────────────────────────────────────────────────────────────────────
// 5. ModuleService — ModuleManager
// ──────────────────────────────────────────────────────────────────────────
service ModuleService {
  rpc Run(ModuleRunRequest) returns (ModuleOutputPb);
  rpc ListSystem(Empty) returns (ModuleListPb);
  rpc ListUser(Empty) returns (ModuleListPb);
  rpc GetSchema(ModuleGetSchemaRequest) returns (RawJsonPb);
  rpc GetSettings(StringRequest) returns (RawJsonPb);
  rpc GetConfig(StringRequest) returns (RawJsonPb);
  rpc SetSettings(ModuleSetSettingsRequest) returns (Status);
  rpc IsEnabled(StringRequest) returns (BoolRequest);
  rpc SetEnabled(ModuleSetEnabledRequest) returns (Status);
  rpc GetCmsSettings(Empty) returns (RawJsonPb);
  rpc GetKakaoMapJsKey(Empty) returns (StringRequest);
}

/** 임의 JSON 직렬화 blob — 동적 스키마 / 설정값 전달용. raw_json = JSON 문자열 (null 이면 "null"). */
message RawJsonPb {
  string raw_json = 1;
}

/** ModuleOutput — sysmod sandbox 실행 결과. */
message ModuleOutputPb {
  bool success = 1;
  optional string data_json = 2;
  optional string error = 3;
  optional string stderr = 4;
  optional int32 exit_code = 5;
  string protocol_version = 6;
}

/** ModuleEntry (SystemEntry) — 시스템·유저 모듈/서비스 항목. */
message ModuleEntryPb {
  string name = 1;
  string description = 2;
  string runtime = 3;
  string entry_type = 4;
  string scope = 5;
  bool enabled = 6;
}

message ModuleListPb {
  repeated ModuleEntryPb entries = 1;
}

// ─── TaskService typed Request messages ─────────────────────────────────────
message TaskRunRequest {
  // 파이프라인 step 배열 — 동적 schema. JSON 직렬화 raw.
  string pipeline_json = 1;
}

// ──────────────────────────────────────────────────────────────────────────
// 6. TaskService — TaskManager
// ──────────────────────────────────────────────────────────────────────────
service TaskService {
  rpc Run(TaskRunRequest) returns (PipelineResultPb);
}

/**
 * Cron RunWhen — 사전 조건 평가 (sysmod 호출 결과 의 field 비교).
 * 2026-05-13 A1-full Phase typed (옛 JSON Value 폐기).
 */
message CronRunWhenPb {
  CronRunWhenCheckPb check = 1;
  string field = 2;
  string op = 3;
  optional string value_json = 4;  // 동적 type (string/number/bool) — JSON string. truthy 등은 미설정.
}

message CronRunWhenCheckPb {
  string sysmod = 1;
  string action = 2;
  optional string input_data_json = 3;  // sysmod inputData — 동적 schema JSON string.
}

/**
 * Cron Retry — 실패 시 retry 정책. 2026-05-13 typed 박힘.
 */
message CronRetryPb {
  int64 count = 1;
  optional int64 delay_ms = 2;
}

/**
 * Cron Notify — 성공/실패 시 sysmod 호출 hook. 2026-05-13 typed 박힘.
 */
message CronNotifyPb {
  optional CronNotifyHookPb on_success = 1;
  optional CronNotifyHookPb on_error = 2;
}

message CronNotifyHookPb {
  string sysmod = 1;
  optional string template = 2;
  optional string chat_id = 3;
}

/** PipelineResult — 파이프라인 실행 결과. data 는 마지막 step 출력 JSON 문자열. */
message PipelineResultPb {
  bool success = 1;
  optional string data_json = 2;
  optional string error = 3;
}

/** CronJobInfo — options 의 동적 JSON 필드(pipeline/inputData/runWhen/retry/notify)는 JSON 문자열. */
message CronJobPb {
  string job_id = 1;
  string target_path = 2;
  string mode = 3;
  string created_at = 4;
  optional string cron_time = 5;
  optional string run_at = 6;
  optional int64 delay_sec = 7;
  optional string start_at = 8;
  optional string end_at = 9;
  optional string input_data_json = 10;
  optional string pipeline_json = 11;
  optional string title = 12;
  optional string description = 13;
  optional bool one_shot = 14;
  optional string run_when_json = 15;
  optional string retry_json = 16;
  optional string notify_json = 17;
  optional string execution_mode = 18;
  optional string agent_prompt = 19;
}

message CronJobListPb {
  repeated CronJobPb jobs = 1;
}

message CronLogEntryPb {
  string job_id = 1;
  string target_path = 2;
  optional string title = 3;
  string triggered_at = 4;
  bool success = 5;
  int64 duration_ms = 6;
  optional string error = 7;
  optional string output_json = 8;
  optional int64 steps_executed = 9;
  optional int64 steps_total = 10;
}

message CronLogListPb {
  repeated CronLogEntryPb entries = 1;
}

message CronNotificationPb {
  string job_id = 1;
  string url = 2;
  string triggered_at = 3;
}

message CronNotificationListPb {
  repeated CronNotificationPb items = 1;
}

message ValidatePipelineResultPb {
  bool valid = 1;
  optional string error = 2;
}

// ─── ScheduleService typed Request messages ─────────────────────────────────
// CronJob 등록/수정 — options 의 동적 필드 (pipeline/inputData/runWhen/retry/notify) 는 JSON 문자열 보존.
message ScheduleCronRequest {
  optional string job_id = 1;
  string target_path = 2;
  string mode = 3;                     // "cron" / "once" / "interval" / "agent"
  optional string cron_time = 4;
  optional string run_at = 5;
  optional int64 delay_sec = 6;
  optional string start_at = 7;
  optional string end_at = 8;
  optional string input_data_json = 9;
  optional string pipeline_json = 10;
  optional string title = 11;
  optional string description = 12;
  optional bool one_shot = 13;
  optional string run_when_json = 14;
  optional string retry_json = 15;
  optional string notify_json = 16;
  optional string execution_mode = 17;
  optional string agent_prompt = 18;
}
message ValidatePipelineRequest {
  string pipeline_json = 1;
}

// ──────────────────────────────────────────────────────────────────────────
// 7. ScheduleService — ScheduleManager
// ──────────────────────────────────────────────────────────────────────────
service ScheduleService {
  rpc ScheduleCron(ScheduleCronRequest) returns (Status);
  rpc CancelCron(StringRequest) returns (Status);
  rpc UpdateCron(ScheduleCronRequest) returns (Status);
  rpc ListCron(Empty) returns (CronJobListPb);
  rpc GetLogs(NumberRequest) returns (CronLogListPb);
  rpc ClearLogs(Empty) returns (Status);
  rpc ConsumeNotifications(Empty) returns (CronNotificationListPb);
  rpc RunNow(StringRequest) returns (Status);
  rpc ValidatePipeline(ValidatePipelineRequest) returns (ValidatePipelineResultPb);
}

// ─── SecretService typed Request messages ───────────────────────────────────
message SecretSetUserRequest {
  string name = 1;
  string value = 2;
}
message SecretSetSystemRequest {
  string key = 1;
  string value = 2;
}

// ──────────────────────────────────────────────────────────────────────────
// 8. SecretService — SecretManager
// ──────────────────────────────────────────────────────────────────────────
service SecretService {
  rpc ListUser(Empty) returns (StringListPb);
  rpc SetUser(SecretSetUserRequest) returns (Status);
  rpc GetUser(StringRequest) returns (OptionalStringPb);
  rpc DeleteUser(StringRequest) returns (Status);
  rpc ListUserModuleSecrets(Empty) returns (ModuleSecretListPb);
  rpc GetSystem(StringRequest) returns (OptionalStringPb);
  rpc SetSystem(SecretSetSystemRequest) returns (Status);
}

/** ModuleSecretEntry — 유저 모듈 config.json secrets 배열 항목 + 등록 여부. */
message ModuleSecretEntryPb {
  string secret_name = 1;
  string module_name = 2;
  bool has_value = 3;
}

message ModuleSecretListPb {
  repeated ModuleSecretEntryPb entries = 1;
}

// ─── McpService typed Request messages ──────────────────────────────────────
message McpAddServerRequest {
  string name = 1;
  string transport = 2;                  // "stdio" / "sse"
  optional string command = 3;
  repeated string args = 4;
  string env_json = 5;                   // env 객체 JSON
  optional string url = 6;
  bool enabled = 7;
}
message McpCallToolRequest {
  string server = 1;
  string tool = 2;
  string arguments_json = 3;
}

// ──────────────────────────────────────────────────────────────────────────
// 9. McpService — McpManager (MCP client - 외부 MCP 서버 호출)
// ──────────────────────────────────────────────────────────────────────────
service McpService {
  rpc ListServers(Empty) returns (RawJsonPb);
  rpc AddServer(McpAddServerRequest) returns (Status);
  rpc RemoveServer(StringRequest) returns (Status);
  rpc ListTools(StringRequest) returns (McpToolListPb);
  rpc ListAllTools(Empty) returns (McpToolListPb);
  rpc CallTool(McpCallToolRequest) returns (RawJsonPb);
}

/** McpToolInfo — MCP 외부 서버 도구 정보. inputSchema 는 JSON Schema 직렬화 문자열. */
message McpToolInfoPb {
  string server = 1;
  string name = 2;
  string description = 3;
  optional string input_schema_json = 4;
}

message McpToolListPb {
  repeated McpToolInfoPb tools = 1;
}

// ─── CapabilityService typed Request messages ───────────────────────────────
message CapabilityRegisterRequest {
  string id = 1;
  string label = 2;
  string description = 3;
}
message CapabilitySetSettingsRequest {
  string cap_id = 1;
  repeated string providers = 2;
}

// ──────────────────────────────────────────────────────────────────────────
// 10. CapabilityService — CapabilityManager
// ──────────────────────────────────────────────────────────────────────────
service CapabilityService {
  rpc List(Empty) returns (RawJsonPb);
  rpc Register(CapabilityRegisterRequest) returns (Status);
  rpc GetProviders(StringRequest) returns (CapabilityProviderListPb);
  rpc ListWithProviders(Empty) returns (CapabilitySummaryListPb);
  rpc Resolve(StringRequest) returns (CapabilityProviderPb);
  rpc GetSettings(StringRequest) returns (CapabilitySettingsPb);
  rpc SetSettings(CapabilitySetSettingsRequest) returns (Status);
}

message CapabilityProviderPb {
  bool present = 1;
  string module_name = 2;
  string provider_type = 3;
  string location = 4;
  string description = 5;
}

message CapabilityProviderListPb {
  repeated CapabilityProviderPb providers = 1;
}

message CapabilitySummaryPb {
  string id = 1;
  string label = 2;
  string description = 3;
  int64 provider_count = 4;
}

message CapabilitySummaryListPb {
  repeated CapabilitySummaryPb summaries = 1;
}

message CapabilitySettingsPb {
  repeated string providers = 1;
}

// ─── AuthService typed messages ─────────────────────────────────────────────

message AuthSessionPb {
  string token = 1;
  string session_type = 2;   // "session" | "api"
  string role = 3;           // "admin"
  int64 created_at = 4;
  optional int64 expires_at = 5;
  optional int64 last_used_at = 6;
  optional string label = 7;
}

/** login 성공/실패 통합 응답. */
message LoginResponsePb {
  bool ok = 1;
  optional AuthSessionPb session = 2;
  optional string error = 3;
  optional string code = 4;
  optional int64 retry_after_sec = 5;
}

message ApiTokenInfoPb {
  bool exists = 1;
  optional string hint = 2;
  optional string label = 3;
  optional string created_at = 4;
  optional string last_used_at = 5;
}

message AdminCredentialsPb {
  string id = 1;
  string password = 2;
}

// ─── AuthService typed Request messages ─────────────────────────────────────
message AuthLoginRequest {
  string id = 1;
  string password = 2;
  // IP / cookie 기반 lock counter 키 (rate limit). 빈 string 이면 lock 없음.
  optional string attempt_key = 3;
}
message AuthSetAdminCredentialsRequest {
  // 부분 변경 가능 — setup wizard 는 둘 다, 비번 변경 PATCH 는 password 만.
  optional string id = 1;
  optional string password = 2;
}
message AuthValidatePasswordPolicyRequest {
  string password = 1;
  optional string id = 2;
}

// ──────────────────────────────────────────────────────────────────────────
// 11. AuthService — AuthManager
// ──────────────────────────────────────────────────────────────────────────
service AuthService {
  rpc Login(AuthLoginRequest) returns (LoginResponsePb);
  rpc Logout(StringRequest) returns (BoolRequest);
  rpc ValidateSession(StringRequest) returns (AuthSessionPb);
  rpc ValidateToken(StringRequest) returns (AuthSessionPb);
  rpc GenerateApiToken(StringRequest) returns (StringRequest);
  rpc ValidateApiToken(StringRequest) returns (AuthSessionPb);
  rpc RevokeApiTokens(Empty) returns (NumberRequest);
  rpc GetApiTokenInfo(Empty) returns (ApiTokenInfoPb);
  rpc GetAdminCredentials(Empty) returns (AdminCredentialsPb);
  rpc SetAdminCredentials(AuthSetAdminCredentialsRequest) returns (Status);
  // 첫 부팅 setup 검출 — frontend `/login` 이 호출, false 면 setup wizard 노출.
  rpc IsAdminSetup(Empty) returns (BoolRequest);
  // 평문 비번 검증 — argon2 hash 비교. SettingsModal 의 비번 변경 PATCH 가 사용
  // (login 부작용 — lock counter / 세션 발급 — 회피).
  rpc VerifyAdminPassword(StringRequest) returns (BoolRequest);
  // 비번 정책 검증 — 8자 이상 + 4 categories 중 3 이상 + (옵션) ID 동일 금지.
  // 입력: {password, id?}. 응답: Status (ok/error/error_code).
  // SetupWizard / 비번 변경 PATCH / setup POST 모두 단일 source.
  rpc ValidatePasswordPolicy(AuthValidatePasswordPolicyRequest) returns (Status);
}

