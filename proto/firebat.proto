  rpc GetSettings(StringRequest) returns (JsonValue);
  rpc GetConfig(StringRequest) returns (JsonValue);
  rpc SetSettings(JsonArgs) returns (Status);
  rpc IsEnabled(StringRequest) returns (BoolRequest);
  rpc SetEnabled(JsonArgs) returns (Status);
  rpc GetCmsSettings(Empty) returns (JsonValue);
  rpc GetKakaoMapJsKey(Empty) returns (JsonValue);
