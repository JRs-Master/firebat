/** AI 모델 carousel — frontend cascade UI source. id / displayName / provider 정의. */
message AvailableAiModelPb {
  string id = 1;
  string display_name = 2;
  string provider = 3;       // "Anthropic" | "Google" | "Vertex" | "OpenAI" | "CLI"
  string format = 4;         // "anthropic-messages" | "openai-responses" | "gemini-native" | "vertex-gemini" | "cli-claude-code" | "cli-codex" | "cli-gemini"
  // thinking / reasoning 모드 — 미지원 모델은 미설정.
  ThinkingConfigPb thinking = 5;
  // 실행 모드 — "api" (pay-per-token) 또는 "cli" (구독 기반).
  string exec_mode = 6;
  // CLI provider sub-category — "claude" / "codex" / "gemini". API 모델은 빈 string.
  string cli_provider = 7;
  // UI 분류 키 — "cli-claude" / "vertex-google" / "api-openai" 등.
  string category = 8;
}

/** 모델별 thinking 모드 + 허용 레벨. */
message ThinkingConfigPb {
  string kind = 1;          // "reasoning" | "thinking" | "extendedThinking"
  repeated ThinkingLevelPb levels = 2;
}

message ThinkingLevelPb {
  string value = 1;                       // "none" | "minimal" | "low" | "medium" | "high" | "xhigh" | "max"
  map<string, string> labels = 2;         // { "ko": "...", "en": "..." } — i18n
}

message AvailableAiModelListPb {
  repeated AvailableAiModelPb models = 1;
}

/** key → model name 맵을 JSON string 으로 직렬화 (동적 키 집합, typed map 불가) */
message LastModelByCategoryPb {
  string raw_json = 1;
}

// ─── SettingsService typed Request messages ─────────────────────────────────
message SettingsSetLastModelByCategoryRequest {
  // {category_id: model_id} 형식 JSON. 동적 키 집합 — proto map 회피.
  string by_category_json = 1;
}

/** Settings — timezone / aiModel / userPrompt / anthropicCache / 등 */
service SettingsService {
  rpc GetTimezone(Empty) returns (StringRequest);
  rpc SetTimezone(StringRequest) returns (BoolRequest);
  rpc GetAiModel(Empty) returns (AiModelResponsePb);
  rpc SetAiModel(StringRequest) returns (BoolRequest);
  rpc GetAiThinkingLevel(Empty) returns (StringRequest);
  rpc SetAiThinkingLevel(StringRequest) returns (BoolRequest);
  rpc GetUserPrompt(Empty) returns (StringRequest);
  rpc SetUserPrompt(StringRequest) returns (BoolRequest);
  rpc GetAnthropicCacheEnabled(Empty) returns (BoolRequest);
  rpc SetAnthropicCacheEnabled(BoolRequest) returns (BoolRequest);
  rpc GetLastModelByCategory(Empty) returns (LastModelByCategoryPb);
  rpc SetLastModelByCategory(SettingsSetLastModelByCategoryRequest) returns (BoolRequest);
  rpc GetAiAssistantModel(Empty) returns (StringRequest);
  rpc SetAiAssistantModel(StringRequest) returns (BoolRequest);
  rpc GetAiAssistantDefault(Empty) returns (StringRequest);
  rpc GetAvailableAiAssistantModels(Empty) returns (AiAssistantModelListPb);
  /** AI 모델 carousel — frontend types.ts AI_MODELS 가 fallback,
   *  Rust builtin_models() 가 single source. */
  rpc GetAvailableAiModels(Empty) returns (AvailableAiModelListPb);
}

// ─── NetworkService typed Request messages ──────────────────────────────────
message NetworkFetchRequest {
  string url = 1;
  optional string method = 2;        // GET / POST / PUT / PATCH / DELETE / HEAD / OPTIONS
  // headers 동적 string→string map — JSON 직렬화.
  optional string headers_json = 3;
  optional string body = 4;
  optional int64 timeout_ms = 5;
}

/** Network — Sandbox 안에서 안전한 외부 fetch */
service NetworkService {
  rpc Fetch(NetworkFetchRequest) returns (RawJsonPb);
}

// ─── CacheService typed Request messages ────────────────────────────────────
message CacheReadRequest {
  string key = 1;
  optional int64 offset = 2;
  optional int64 limit = 3;
}
message CacheGrepRequest {
  string key = 1;
  string field = 2;
  string op = 3;
  string value_json = 4;
}
message CacheAggregateRequest {
  string key = 1;
  string field = 2;
  string op = 3;
}

/** Cache — sysmod 결과 cache 공통 layer */
service CacheService {
  rpc Read(CacheReadRequest) returns (RawJsonPb);
  rpc Grep(CacheGrepRequest) returns (RawJsonPb);
  rpc Aggregate(CacheAggregateRequest) returns (RawJsonPb);
  rpc Drop(StringRequest) returns (Status);
}

// ─── TelegramService typed Request messages ─────────────────────────────────
message TelegramProcessMessageRequest {
  string text = 1;
  // Telegram chat id — string 또는 number. service 가 두 형식 다 받기 위해 string.
  string chat_id = 2;
}

/** Telegram — 양방향 봇 + send-only */
service TelegramService {
  rpc SetupWebhook(StringRequest) returns (RawJsonPb);
  rpc RemoveWebhook(Empty) returns (RawJsonPb);
  rpc GetWebhookStatus(Empty) returns (RawJsonPb);
  rpc IsOwner(StringRequest) returns (BoolRequest);
  rpc GetWebhookSecret(Empty) returns (RawJsonPb);
  rpc ProcessMessage(TelegramProcessMessageRequest) returns (RawJsonPb);
}

// ─── DatabaseService typed Request messages ─────────────────────────────────
message DatabaseQueryRequest {
  string sql = 1;
  // params 배열 JSON — 동적 typed.
  string params_json = 2;
}

/** Database — raw query (BIBLE 의 도메인 port 마이그레이션 영역 — Phase B 개선 후보) */
service DatabaseService {
  rpc Query(DatabaseQueryRequest) returns (RawJsonPb);
}

// ─── MemoryService typed Request messages ───────────────────────────────────
message MemorySaveFileRequest {
  string name = 1;
  string content = 2;
}

/** Memory — Claude memory file 시스템 */
service MemoryService {
  rpc GetIndex(Empty) returns (StringRequest);
  rpc ReadFile(StringRequest) returns (RawJsonPb);
  rpc ListFiles(Empty) returns (RawJsonPb);
  rpc SaveFile(MemorySaveFileRequest) returns (Status);
  rpc DeleteFile(StringRequest) returns (Status);
}

// ─── LifecycleService typed Request messages ────────────────────────────────
message LifecycleCaptureExceptionRequest {
  string message = 1;
  optional string stack = 2;
  optional string severity = 3;       // "error" / "warn" / "info"
  // 임의 추가 메타 JSON.
  optional string meta_json = 4;
}

/** Lifecycle / Health — 헬스 체크 + graceful shutdown 등 */
service LifecycleService {
  rpc Health(Empty) returns (HealthInfo);
  rpc CaptureException(LifecycleCaptureExceptionRequest) returns (Status);
  rpc GracefulShutdown(NumberRequest) returns (Status);
}

