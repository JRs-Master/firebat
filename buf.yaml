version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    - SERVICE_SUFFIX
    - FIELD_LOWER_SNAKE_CASE
    - PACKAGE_DIRECTORY_MATCH
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    # message naming convention (`{ServiceFull}{RpcName}Request/Response`) — 매 RPC unique 박힘
    # (`RPC_REQUEST_RESPONSE_UNIQUE` 통과) 후 schema stability 핵심 가치 박힘. naming 은 cosmetic.
    # ~400 message rename 작업 vs 단일 사용자 환경 가치 0 — YAGNI. 외부 client / multi-tenant 시점 박음.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
