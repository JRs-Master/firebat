// ──────────────────────────────────────────────────────────────────────────
// 12. ConversationService — ConversationManager (+ Share)
// ──────────────────────────────────────────────────────────────────────────
service ConversationService {
  rpc List(ConversationListRequest) returns (ConversationListResponse);
  rpc Get(ConversationGetRequest) returns (ConversationGetResponse);
  rpc Save(ConversationSaveRequest) returns (ConversationSaveResponse);
  /// 삭제 — soft delete. conversations.deleted_at 추가. 30일 후 cleanup cron 이 cascade 삭제.
  rpc Delete(ConversationDeleteRequest) returns (ConversationDeleteResponse);
  rpc IsDeleted(ConversationIsDeletedRequest) returns (ConversationIsDeletedResponse);
  /// 휴지통 (soft-deleted) 목록 — owner 기준. 최신 삭제 순.
  rpc ListDeleted(ConversationListDeletedRequest) returns (ConversationListDeletedResponse);
  /// 휴지통에서 복원 — deleted_at NULL. 30일 cleanup 대상에서 제외.
  rpc Restore(ConversationRestoreRequest) returns (ConversationRestoreResponse);
  /// 영구 삭제 — DB row + 첨부 이미지 cascade. 휴지통에서도 사라짐.
  rpc PermanentDelete(ConversationPermanentDeleteRequest) returns (ConversationPermanentDeleteResponse);
  rpc SearchHistory(ConversationSearchHistoryRequest) returns (ConversationSearchHistoryResponse);
  rpc GetCliSession(ConversationGetCliSessionRequest) returns (ConversationGetCliSessionResponse);
  rpc SetCliSession(ConversationSetCliSessionRequest) returns (ConversationSetCliSessionResponse);
  rpc CreateShare(ConversationCreateShareRequest) returns (ConversationCreateShareResponse);
  rpc GetShare(ConversationGetShareRequest) returns (ConversationGetShareResponse);
  rpc CleanupExpiredShares(ConversationCleanupExpiredSharesRequest) returns (ConversationCleanupExpiredSharesResponse);
  /// 30일 retention cleanup — soft-deleted conversations + 임시 첨부 이미지 cascade.
  /// internal cron 이 6h 마다 호출.
  rpc CleanupOldDeleted(ConversationCleanupOldDeletedRequest) returns (ConversationCleanupOldDeletedResponse);
}

