// ──────────────────────────────────────────────────────────────────────────
// LibraryService — Phase 1 (2026-05-17). NotebookLM 같은 RAG 영역.
// 매 Reference = 자료 그룹 (예: "법률 자료 2026"), 매 Source = 매 자료 (PDF / TXT / MD / URL / 직접 입력),
// 매 Chunk = ~500 토큰 임베딩 단위. RetrievalEngine 5tier 영역 자연 통합.
// ──────────────────────────────────────────────────────────────────────────

message LibraryReferencePb {
  string id = 1;
  string name = 2;
  string description = 3;
  string owner = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message LibrarySourcePb {
  string id = 1;
  string reference_id = 2;
  string name = 3;
  // "pdf" / "txt" / "md" / "url" / "text"
  string source_type = 4;
  string source_url = 5;
  string file_path = 6;
  string full_text = 7;
  int64 char_count = 8;
  int64 chunk_count = 9;
  int64 created_at = 10;
}

message LibraryHitPb {
  string source_id = 1;
  string source_name = 2;
  string reference_id = 3;
  string reference_name = 4;
  string chunk_id = 5;
  int64 chunk_index = 6;
  string content = 7;
  optional int64 page_number = 8;
  float score = 9;
}

// Reference CRUD
message LibraryCreateReferenceRequest {
  string name = 1;
  string description = 2;
  string owner = 3;
}
message LibraryCreateReferenceResponse {
  string id = 1;
}
message LibraryListReferencesRequest {
  string owner = 1;
}
message LibraryListReferencesResponse {
  repeated LibraryReferencePb references = 1;
}
message LibraryDeleteReferenceRequest {
  string id = 1;
}
message LibraryDeleteReferenceResponse {}

// Source CRUD
message LibraryUploadSourceRequest {
  string reference_id = 1;
  string name = 2;
  // "pdf" / "txt" / "md" / "url" / "text"
  string source_type = 3;
  // 매 source_type 별 한 영역만 박음. text/url 영역 = inline_text 직접, pdf/txt/md 영역 = file_path 영역.
  string source_url = 4;
  string file_path = 5;
  string inline_text = 6;
  // 정밀 추출 (vision LLM) — 수동 opt-in (pdf 전용). pdf-extract 대신 Gemini 가 PDF 를 직접 읽어
  // 수식 LaTeX·레이아웃 보존 추출. Gemini 키 필요.
  bool precise = 7;
  // 품질 향상 — true = Gemini Pro (고품질), false = Gemini Flash (기본·저렴). precise 시에만 의미.
  bool quality_boost = 8;
}
message LibraryUploadSourceResponse {
  string source_id = 1;
  int64 chunk_count = 2;
  // 동일 내용(content_hash)이 같은 reference 에 이미 있어 새로 만들지 않고 기존 반환 (중복 차단).
  bool deduped = 3;
}
message LibraryReextractSourceRequest {
  string source_id = 1;
  // 정밀 추출(vision) — pdf 전용. quality_boost = Gemini Pro, 아니면 Flash.
  bool precise = 2;
  bool quality_boost = 3;
}
message LibraryReextractSourceResponse {
  int64 chunk_count = 1;
}
message LibraryListSourcesRequest {
  string reference_id = 1;
}
message LibraryListSourcesResponse {
  repeated LibrarySourcePb sources = 1;
}
message LibraryGetSourceRequest {
  string id = 1;
}
message LibraryGetSourceResponse {
  LibrarySourcePb source = 1;
}
message LibraryDeleteSourceRequest {
  string id = 1;
}
message LibraryDeleteSourceResponse {}

// Search
message LibrarySearchRequest {
  string owner = 1;
  string query = 2;
  // 빈 배열 = 매 admin Reference 영역 전체 자동 매치.
  repeated string reference_ids = 3;
  // 0 = default 5.
  int64 top_k = 4;
}
message LibrarySearchResponse {
  repeated LibraryHitPb hits = 1;
}

service LibraryService {
  rpc CreateReference(LibraryCreateReferenceRequest) returns (LibraryCreateReferenceResponse);
  rpc ListReferences(LibraryListReferencesRequest) returns (LibraryListReferencesResponse);
  rpc DeleteReference(LibraryDeleteReferenceRequest) returns (LibraryDeleteReferenceResponse);
  rpc UploadSource(LibraryUploadSourceRequest) returns (LibraryUploadSourceResponse);
  rpc ListSources(LibraryListSourcesRequest) returns (LibraryListSourcesResponse);
  rpc GetSource(LibraryGetSourceRequest) returns (LibraryGetSourceResponse);
  rpc DeleteSource(LibraryDeleteSourceRequest) returns (LibraryDeleteSourceResponse);
  rpc ReextractSource(LibraryReextractSourceRequest) returns (LibraryReextractSourceResponse);
  rpc Search(LibrarySearchRequest) returns (LibrarySearchResponse);
}

// ──────────────────────────────────────────────────────────────────────────
// HubService — system service hub (Phase 1, 2026-05-17).
// 외부 워드프레스 사이트 연결용. admin chat 과 별개 (대화 / 메시지 테이블 분리).
