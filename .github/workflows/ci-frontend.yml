# Firebat CI — Frontend (Next.js + lib + language) 변경 시만 trigger.
#
# Rust-only 변경 (core/ infra/ proto/) 시 npm install + tsc 생략.
#
# Trigger: app / lib / language / package*.json / next.config.* / tsconfig.json 변경 시.
# mcp/ 는 Phase E 완전 폐기됨 (2026-05-12, Rust 단일 binary 안 통합) — paths 에서 제외.

name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'language/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'tsconfig.json'
      - 'proxy.ts'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'language/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'tsconfig.json'
      - 'proxy.ts'
      - '.github/workflows/ci-frontend.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  typescript:
    name: TypeScript (tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: npm install
        # npm ci 는 lock 정확 일치 강제 — Windows (개발자) / Linux (CI) 의 platform-specific
        # native deps (@emnapi 등) 차이로 mismatch 발생. npm install 로 lock 자동 갱신 허용.
        run: npm install --legacy-peer-deps

      - name: typecheck
        run: npm run typecheck
