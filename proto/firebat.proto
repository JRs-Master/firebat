// ──────────────────────────────────────────────────────────────────────────
// Cross-cutting (Core facade 직속)
// ──────────────────────────────────────────────────────────────────────────

/** Settings — timezone / aiModel / userPrompt / anthropicCache / 등 */
service SettingsService {
  rpc GetTimezone(Empty) returns (StringRequest);
  rpc SetTimezone(StringRequest) returns (BoolRequest);
  rpc GetAiModel(Empty) returns (JsonValue);
  rpc SetAiModel(StringRequest) returns (BoolRequest);
  rpc GetAiThinkingLevel(Empty) returns (StringRequest);
  rpc SetAiThinkingLevel(StringRequest) returns (BoolRequest);
  rpc GetUserPrompt(Empty) returns (StringRequest);
  rpc SetUserPrompt(StringRequest) returns (BoolRequest);
  rpc GetAnthropicCacheEnabled(Empty) returns (BoolRequest);
  rpc SetAnthropicCacheEnabled(BoolRequest) returns (BoolRequest);
  rpc GetLastModelByCategory(Empty) returns (JsonValue);
  rpc SetLastModelByCategory(JsonArgs) returns (BoolRequest);
  rpc GetAiAssistantModel(Empty) returns (StringRequest);
  rpc SetAiAssistantModel(StringRequest) returns (BoolRequest);
  rpc GetAiAssistantDefault(Empty) returns (StringRequest);
  rpc GetAvailableAiAssistantModels(Empty) returns (JsonValue);
}

/** Network — Sandbox 안에서 안전한 외부 fetch */
service NetworkService {
  rpc Fetch(JsonArgs) returns (JsonValue);
}

/** Cache — sysmod 결과 cache 공통 layer */
service CacheService {
  rpc Read(JsonArgs) returns (JsonValue);
  rpc Grep(JsonArgs) returns (JsonValue);
  rpc Aggregate(JsonArgs) returns (JsonValue);
  rpc Drop(StringRequest) returns (Status);
}

/** Telegram — 양방향 봇 + send-only */
service TelegramService {
  rpc SetupWebhook(StringRequest) returns (JsonValue);
  rpc RemoveWebhook(Empty) returns (JsonValue);
  rpc GetWebhookStatus(Empty) returns (JsonValue);
  rpc IsOwner(StringRequest) returns (BoolRequest);
  rpc GetWebhookSecret(Empty) returns (JsonValue);
  rpc ProcessMessage(JsonArgs) returns (JsonValue);
}

/** Database — raw query (BIBLE 의 도메인 port 마이그레이션 영역 — Phase B 개선 후보) */
service DatabaseService {
  rpc Query(JsonArgs) returns (JsonValue);
}

/** Memory — Claude memory file 시스템 */
service MemoryService {
  rpc GetIndex(Empty) returns (StringRequest);
  rpc ReadFile(StringRequest) returns (JsonValue);
  rpc ListFiles(Empty) returns (JsonValue);
  rpc SaveFile(JsonArgs) returns (Status);
  rpc DeleteFile(StringRequest) returns (Status);
}

/** Lifecycle / Health — 헬스 체크 + graceful shutdown 등 */
service LifecycleService {
  rpc Health(Empty) returns (HealthInfo);
  rpc CaptureException(JsonArgs) returns (Status);
  rpc GracefulShutdown(NumberRequest) returns (Status);
}

