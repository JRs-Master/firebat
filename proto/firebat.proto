// ─── 외부 endpoint 통합 send_message ──────────────────────────────────────
// 외부 hub endpoint (POST /api/hub/<slug>/chat) 가 호출하는 단일 RPC.
// 옛 Authenticate + EnsureConversation + AppendUserMessage + AI 호출 + AppendSystemMessage
// 5 RPC 분리 호출 영역 (route layer 안 비즈니스 흐름 leak) 단일 entry 영역 통합.
//
// Manager 안 흐름:
//   1. authenticate (slug + api_token + origin) → instance
//   2. ensure_conversation (instance_id + session_id) → conversation_id
//   3. append_user_message
//   4. HubContext (allowed_sysmods / allowed_references / history) 빌드 + AiManager 호출
//   5. AI 응답 영역 append_system_message
//
// 응답 raw_json = AiResponse (reply + blocks + suggestions + tool_results 등).
message HubSendMessageRequest {
  string slug = 1;
  string api_token = 2;
  string origin = 3;
  string session_id = 4;
  string user_message = 5;
  string self_host = 6;         // 우리 사이트 host. origin 일치 시 자동 허용 (page mode)
  // visitor 가 박은 plan mode (off / auto / always). 빈 string = off.
  string plan_mode = 7;
  // 사용자 ✓실행 클릭 시점 frontend 가 동봉. 빈 string = 일반 turn.
  string plan_execute_id = 8;
  // 사용자 ⚙수정 제안 후 텍스트 입력 시점 frontend 가 동봉. 빈 string = 일반 turn.
  string plan_revise_id = 9;
}
message HubSendMessageResponse {
  string conversation_id = 1;
  string raw_json = 2;          // AiResponse JSON — admin chat 영역 동일 포맷
}

// streaming 전용 — buf STANDARD RPC_REQUEST_RESPONSE_UNIQUE 충족 (RPC 마다 고유 req/resp).
// 필드는 HubSendMessageRequest 와 동일 (unary 와 같은 입력).
message HubSendMessageStreamRequest {
  string slug = 1;
  string api_token = 2;
  string origin = 3;
  string session_id = 4;
  string user_message = 5;
  string self_host = 6;
  string plan_mode = 7;
  string plan_execute_id = 8;
  string plan_revise_id = 9;
}
// streaming 응답 이벤트 — AiStreamEventPb 와 동일 shape (sub-event 메시지 재사용). top-level 만 분리.
message HubStreamEventPb {
  oneof event {
    AiChunkEventPb chunk = 1;
    AiStepEventPb step = 2;
    AiResultEventPb result = 3;
    AiErrorEventPb error = 4;
  }
}

service HubService {
  // Instance CRUD (admin)
  rpc CreateInstance(HubCreateInstanceRequest) returns (HubCreateInstanceResponse);
  rpc ListInstances(HubListInstancesRequest) returns (HubListInstancesResponse);
  rpc GetInstance(HubGetInstanceRequest) returns (HubGetInstanceResponse);
  rpc GetInstanceBySlug(HubGetInstanceBySlugRequest) returns (HubGetInstanceBySlugResponse);
  rpc UpdateInstance(HubUpdateInstanceRequest) returns (HubUpdateInstanceResponse);
  rpc DeleteInstance(HubDeleteInstanceRequest) returns (HubDeleteInstanceResponse);
  rpc RotateApiToken(HubRotateApiTokenRequest) returns (HubRotateApiTokenResponse);

  // 외부 endpoint 검증
  rpc Authenticate(HubAuthenticateRequest) returns (HubAuthenticateResponse);

  // Conversation
  rpc EnsureConversation(HubEnsureConversationRequest) returns (HubEnsureConversationResponse);
  rpc CreateConversation(HubCreateConversationRequest) returns (HubCreateConversationResponse);
  rpc ListConversations(HubListConversationsRequest) returns (HubListConversationsResponse);
  rpc GetConversation(HubGetConversationRequest) returns (HubGetConversationResponse);
  rpc DeleteConversation(HubDeleteConversationRequest) returns (HubDeleteConversationResponse);
  rpc ListDeletedConversations(HubListDeletedConversationsRequest) returns (HubListDeletedConversationsResponse);
  rpc RestoreConversation(HubRestoreConversationRequest) returns (HubRestoreConversationResponse);
  rpc PermanentDeleteConversation(HubPermanentDeleteConversationRequest) returns (HubPermanentDeleteConversationResponse);
  rpc UpdateConversationTitle(HubUpdateConversationTitleRequest) returns (HubUpdateConversationTitleResponse);

  // Message
  rpc AppendUserMessage(HubAppendUserMessageRequest) returns (HubAppendUserMessageResponse);
  rpc AppendSystemMessage(HubAppendSystemMessageRequest) returns (HubAppendSystemMessageResponse);
  rpc ListMessages(HubListMessagesRequest) returns (HubListMessagesResponse);

  // 외부 endpoint 통합 entry — 인증 + 대화 ensure + AI 호출 + 영속화 통합
  rpc SendMessage(HubSendMessageRequest) returns (HubSendMessageResponse);

  // streaming 변형 — admin chat 과 동일한 AiStreamEventPb 스트림 (chunk/step/result/error).
  // hub plan mode 가 admin 과 같은 경로를 타게 해 plan-confirm suggestions(실행 카드) 누락을 근본 차단.
  // SendMessage 는 thin wrapper 로 잔존 (Phase 4 에서 제거 예정).
  rpc SendMessageStream(HubSendMessageStreamRequest) returns (stream HubStreamEventPb);
}

// ──────────────────────────────────────────────────────────────────────────
// LogService — 로그 시스템 Phase 4 (2026-05-21). sqlite ring buffer (data/logs.db)
// 조회 + 런타임 filter 동적 변경 (SIGHUP 대신 RPC). admin 로그 탭 (Phase 5) 사용.
// ──────────────────────────────────────────────────────────────────────────
service LogService {
  rpc QueryLogs(LogQueryRequest) returns (LogQueryResponse);
  rpc SetLogFilter(SetLogFilterRequest) returns (SetLogFilterResponse);
}

message LogEntryPb {
  int64 ts_ms = 1;
  string level = 2;
  string target = 3;
  string message = 4;
}

message LogQueryRequest {
  string min_level = 1;      // "" = 전체 ("ERROR"/"WARN"/"INFO"/"DEBUG")
  string target_prefix = 2;  // "" = 전체
  int64 since_ms = 3;        // 0 = 전체
  int32 limit = 4;           // 0 = default 200
}

message LogQueryResponse {
  repeated LogEntryPb entries = 1;
}

message SetLogFilterRequest {
  string filter = 1;  // EnvFilter 문자열 (예: "info,firebat_infra::adapters::sandbox=debug")
}

message SetLogFilterResponse {
  bool ok = 1;
  string error = 2;
}

