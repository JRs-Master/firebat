// Firebat Core gRPC schema (v1.0 Final Phase A — skeleton + service 분리).
//
// Phase A: 21 매니저 + cross-cutting service skeleton 박음. RPC list 정의.
//          message body 는 JsonValue 단일화 — Phase B 에서 매니저별 typed message 로 점진 변환.
// Phase B: 각 매니저 Rust 구현하면서 typed request/response 박음.
//
// 사용 path:
//  - Rust Core: tonic-build (build.rs) 가 .proto 컴파일 → src/proto/ 자동 생성
//  - TS client (lib/core-client.ts 의 'rust' backend): @grpc/grpc-js + protoc-gen-ts
//
// 21 매니저:
//   AiManager / StorageManager / PageManager / ProjectManager / ModuleManager
//   TaskManager / ScheduleManager / SecretManager / McpManager / CapabilityManager
//   AuthManager / ConversationManager / MediaManager / EventManager / StatusManager
//   CostManager / ToolManager / EntityManager / EpisodicManager / ConsolidationManager / TemplateManager
//
// Cross-cutting (Core facade 직속): Settings / Network / Cache / Telegram / Database / Lifecycle / Memory file

syntax = "proto3";

package firebat.v1;

// ──────────────────────────────────────────────────────────────────────────
// 공통 타입
// ──────────────────────────────────────────────────────────────────────────

message Empty {}

/** RPC 응답의 ok / error 표준 */
message Status {
  bool ok = 1;
  string error = 2;
  string error_code = 3;
}

/** Phase A: typed message 정의 전 사용. JSON 직렬화 string. Phase B 에서 매니저별 typed 로 swap. */
message JsonValue {
  string raw = 1;
}

/** 인자 0~N 개 — JsonValue 배열. 단일 객체면 raw=JSON 문자열, 다인자면 array. */
message JsonArgs {
  string raw = 1;
}

/** ID 단일 인자 — string 또는 number 허용 */
message IdRequest {
  string id = 1;
}

message StringRequest { string value = 1; }
message NumberRequest { int64 value = 1; }
message BoolRequest { bool value = 1; }

/** 헬스 / 버전 정보 */
message HealthInfo {
  string version = 1;
  int64 uptime_ms = 2;
  bool ready = 3;
  repeated string active_managers = 4;
}

// ──────────────────────────────────────────────────────────────────────────
// 1. AiService — AiManager
//   process / requestActionWithTools / codeAssist / runAgentJob / resolveCallTarget /
//   spawnSubAgent / isSubAgentEnabled / setSubAgentEnabled
// ──────────────────────────────────────────────────────────────────────────
service AiService {
  rpc Process(JsonArgs) returns (JsonValue);
  rpc RequestActionWithTools(JsonArgs) returns (JsonValue);
  rpc CodeAssist(JsonArgs) returns (JsonValue);
  rpc RunAgentJob(JsonArgs) returns (JsonValue);
  rpc ResolveCallTarget(StringRequest) returns (JsonValue);
  rpc SpawnSubAgent(JsonArgs) returns (JsonValue);
  rpc IsSubAgentEnabled(Empty) returns (BoolRequest);
  rpc SetSubAgentEnabled(BoolRequest) returns (Status);
}

// ──────────────────────────────────────────────────────────────────────────
// 2. StorageService — StorageManager
// ──────────────────────────────────────────────────────────────────────────
service StorageService {
  rpc ReadFile(StringRequest) returns (JsonValue);
  rpc ReadFileBinary(StringRequest) returns (JsonValue);
  rpc WriteFile(JsonArgs) returns (Status);
  rpc DeleteFile(StringRequest) returns (Status);
  rpc ListDir(StringRequest) returns (JsonValue);
  rpc ListFiles(StringRequest) returns (JsonValue);
  rpc GetFileTree(StringRequest) returns (JsonValue);
  rpc GlobFiles(JsonArgs) returns (JsonValue);
}

// ─── PageService typed messages ──────────────────────────────────────────────

message PageListItemPb {
  string slug = 1;
  string status = 2;
  optional string project = 3;
  optional string visibility = 4;
  optional string title = 5;
  int64 updated_at = 6;
  int64 created_at = 7;
  optional string featured_image = 8;
  optional string excerpt = 9;
}

message PageListResponsePb {
  repeated PageListItemPb items = 1;
}

message PageRecordPb {
  string slug = 1;
  string spec = 2;
  string status = 3;
  optional string project = 4;
  optional string visibility = 5;
  optional string password = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message PageSaveResultPb {
  bool ok = 1;
  string slug = 2;
  optional string error = 3;
}

/** get_redirect: Some(url) → value set; None → value empty. */
message OptionalStringPb {
  string value = 1;
  bool present = 2;
}

message StringListPb {
  repeated string values = 1;
}

message MediaUsageEntryPb {
  string page_slug = 1;
  int64 used_at = 2;
}

message MediaUsageListPb {
  repeated MediaUsageEntryPb entries = 1;
}

message TagSummaryPb {
  string tag = 1;
  int64 count = 2;
  repeated string slugs = 3;
}

message TagListPb {
  repeated TagSummaryPb tags = 1;
}

// ──────────────────────────────────────────────────────────────────────────
// 3. PageService — PageManager
// ──────────────────────────────────────────────────────────────────────────
service PageService {
  rpc List(Empty) returns (PageListResponsePb);
  rpc Search(JsonArgs) returns (PageListResponsePb);
  rpc Get(StringRequest) returns (PageRecordPb);
  rpc Save(JsonArgs) returns (PageSaveResultPb);
  rpc Delete(StringRequest) returns (Status);
  rpc Rename(JsonArgs) returns (Status);
  rpc GetRedirect(StringRequest) returns (OptionalStringPb);
  rpc ListStatic(Empty) returns (StringListPb);
  rpc FindMediaUsage(StringRequest) returns (MediaUsageListPb);
  rpc SetVisibility(JsonArgs) returns (Status);
  rpc VerifyPassword(JsonArgs) returns (BoolRequest);
  rpc FindRelated(JsonArgs) returns (PageListResponsePb);
  rpc ListAllTags(Empty) returns (TagListPb);
}

// ─── ProjectService typed messages ───────────────────────────────────────────

message ProjectEntryPb {
  string name = 1;
  repeated string paths = 2;
  repeated string page_slugs = 3;
  string visibility = 4;   // "public" | "password" | "private"
}

message ProjectListPb {
  repeated ProjectEntryPb projects = 1;
}

message ProjectVisibilityPb {
  string visibility = 1;   // "public" | "password" | "private"
}

/** project config.json 내용 — 동적 JSON, raw string 으로 직렬화. */
message ProjectConfigPb {
  string raw_json = 1;
}

// ──────────────────────────────────────────────────────────────────────────
// 4. ProjectService — ProjectManager
// ──────────────────────────────────────────────────────────────────────────
service ProjectService {
  rpc Scan(Empty) returns (ProjectListPb);
  rpc SetVisibility(JsonArgs) returns (Status);
  rpc GetVisibility(StringRequest) returns (ProjectVisibilityPb);
  rpc GetConfig(StringRequest) returns (ProjectConfigPb);
  rpc SetConfig(JsonArgs) returns (Status);
  rpc VerifyPassword(JsonArgs) returns (BoolRequest);
  rpc Delete(StringRequest) returns (Status);
  rpc Rename(JsonArgs) returns (Status);
}

// ──────────────────────────────────────────────────────────────────────────
// 5. ModuleService — ModuleManager
// ──────────────────────────────────────────────────────────────────────────
service ModuleService {
  rpc Run(JsonArgs) returns (JsonValue);
  rpc ListSystem(Empty) returns (JsonValue);
  rpc ListUser(Empty) returns (JsonValue);
  rpc GetSchema(JsonArgs) returns (JsonValue);
  rpc GetSettings(StringRequest) returns (JsonValue);
  rpc GetConfig(StringRequest) returns (JsonValue);
  rpc SetSettings(JsonArgs) returns (Status);
  rpc IsEnabled(StringRequest) returns (BoolRequest);
  rpc SetEnabled(JsonArgs) returns (Status);
  rpc GetCmsSettings(Empty) returns (JsonValue);
  rpc GetKakaoMapJsKey(Empty) returns (JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 6. TaskService — TaskManager
// ──────────────────────────────────────────────────────────────────────────
service TaskService {
  rpc Run(JsonArgs) returns (JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 7. ScheduleService — ScheduleManager
// ──────────────────────────────────────────────────────────────────────────
service ScheduleService {
  rpc ScheduleCron(JsonArgs) returns (Status);
  rpc CancelCron(StringRequest) returns (Status);
  rpc UpdateCron(JsonArgs) returns (Status);
  rpc ListCron(Empty) returns (JsonValue);
  rpc GetLogs(NumberRequest) returns (JsonValue);
  rpc ClearLogs(Empty) returns (Status);
  rpc ConsumeNotifications(Empty) returns (JsonValue);
  rpc RunNow(StringRequest) returns (Status);
  rpc ValidatePipeline(JsonArgs) returns (JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 8. SecretService — SecretManager
// ──────────────────────────────────────────────────────────────────────────
service SecretService {
  rpc ListUser(Empty) returns (JsonValue);
  rpc SetUser(JsonArgs) returns (Status);
  rpc GetUser(StringRequest) returns (JsonValue);
  rpc DeleteUser(StringRequest) returns (Status);
  rpc ListUserModuleSecrets(Empty) returns (JsonValue);
  rpc GetSystem(StringRequest) returns (JsonValue);
  rpc SetSystem(JsonArgs) returns (Status);
}

// ──────────────────────────────────────────────────────────────────────────
// 9. McpService — McpManager (MCP client - 외부 MCP 서버 호출)
// ──────────────────────────────────────────────────────────────────────────
service McpService {
  rpc ListServers(Empty) returns (JsonValue);
  rpc AddServer(JsonArgs) returns (Status);
  rpc RemoveServer(StringRequest) returns (Status);
  rpc ListTools(StringRequest) returns (JsonValue);
  rpc ListAllTools(Empty) returns (JsonValue);
  rpc CallTool(JsonArgs) returns (JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 10. CapabilityService — CapabilityManager
// ──────────────────────────────────────────────────────────────────────────
service CapabilityService {
  rpc List(Empty) returns (JsonValue);
  rpc Register(JsonArgs) returns (Status);
  rpc GetProviders(StringRequest) returns (JsonValue);
  rpc ListWithProviders(Empty) returns (JsonValue);
  rpc Resolve(StringRequest) returns (JsonValue);
  rpc GetSettings(StringRequest) returns (JsonValue);
  rpc SetSettings(JsonArgs) returns (Status);
}

// ─── AuthService typed messages ─────────────────────────────────────────────

message AuthSessionPb {
  string token = 1;
  string session_type = 2;   // "session" | "api"
  string role = 3;           // "admin"
  int64 created_at = 4;
  optional int64 expires_at = 5;
  optional int64 last_used_at = 6;
  optional string label = 7;
}

/** login 성공/실패 통합 응답. */
message LoginResponsePb {
  bool ok = 1;
  optional AuthSessionPb session = 2;
  optional string error = 3;
  optional string code = 4;
  optional int64 retry_after_sec = 5;
}

message ApiTokenInfoPb {
  bool exists = 1;
  optional string hint = 2;
  optional string label = 3;
  optional string created_at = 4;
  optional string last_used_at = 5;
}

message AdminCredentialsPb {
  string id = 1;
  string password = 2;
}

// ──────────────────────────────────────────────────────────────────────────
// 11. AuthService — AuthManager
// ──────────────────────────────────────────────────────────────────────────
service AuthService {
  rpc Login(JsonArgs) returns (LoginResponsePb);
  rpc Logout(StringRequest) returns (BoolRequest);
  rpc ValidateSession(StringRequest) returns (AuthSessionPb);
  rpc ValidateToken(StringRequest) returns (AuthSessionPb);
  rpc GenerateApiToken(StringRequest) returns (StringRequest);
  rpc ValidateApiToken(StringRequest) returns (AuthSessionPb);
  rpc RevokeApiTokens(Empty) returns (NumberRequest);
  rpc GetApiTokenInfo(Empty) returns (ApiTokenInfoPb);
  rpc GetAdminCredentials(Empty) returns (AdminCredentialsPb);
  rpc SetAdminCredentials(JsonArgs) returns (Status);
  // 첫 부팅 setup 검출 — frontend `/login` 이 호출, false 면 setup wizard 노출.
  rpc IsAdminSetup(Empty) returns (BoolRequest);
  // 평문 비번 검증 — argon2 hash 비교. SettingsModal 의 비번 변경 PATCH 가 사용
  // (login 부작용 — lock counter / 세션 발급 — 회피).
  rpc VerifyAdminPassword(StringRequest) returns (BoolRequest);
}

message ConversationSummaryPb {
  string id = 1;
  string title = 2;
  int64 created_at = 3;
  int64 updated_at = 4;
}

message ConversationListPb {
  repeated ConversationSummaryPb items = 1;
}

message ConversationRecordPb {
  string id = 1;
  string title = 2;
  /** messages 배열 — JSON 직렬화 (동적 Message 타입). */
  string messages_json = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
}

message HistorySearchMatchPb {
  string conv_id = 1;
  optional string conv_title = 2;
  int64 msg_idx = 3;
  string role = 4;
  string content_preview = 5;
  int64 created_at = 6;
  float score = 7;
  /** includeBlocks=true 시 AI blocks JSON. */
  optional string blocks_json = 8;
}

message HistorySearchResultPb {
  repeated HistorySearchMatchPb matches = 1;
}

message ShareResultPb {
  string slug = 1;
  int64 expires_at = 2;
  bool reused = 3;
}

message SharedConversationPb {
  /** slug 빈 문자열이면 없음. */
  string slug = 1;
  string share_type = 2;
  string title = 3;
  /** messages 배열 — JSON 직렬화. */
  string messages_json = 4;
  int64 created_at = 5;
  int64 expires_at = 6;
}

// ──────────────────────────────────────────────────────────────────────────
// 12. ConversationService — ConversationManager (+ Share)
// ──────────────────────────────────────────────────────────────────────────
service ConversationService {
  rpc List(StringRequest) returns (ConversationListPb);
  rpc Get(JsonArgs) returns (ConversationRecordPb);
  rpc Save(JsonArgs) returns (Status);
  rpc Delete(JsonArgs) returns (Status);
  rpc IsDeleted(JsonArgs) returns (BoolRequest);
  rpc SearchHistory(JsonArgs) returns (HistorySearchResultPb);
  rpc GetCliSession(JsonArgs) returns (OptionalStringPb);
  rpc SetCliSession(JsonArgs) returns (Status);
  rpc CreateShare(JsonArgs) returns (ShareResultPb);
  rpc GetShare(StringRequest) returns (SharedConversationPb);
  rpc CleanupExpiredShares(Empty) returns (NumberRequest);
}

// ──────────────────────────────────────────────────────────────────────────
// 13. MediaService — MediaManager
// ──────────────────────────────────────────────────────────────────────────
service MediaService {
  rpc Read(StringRequest) returns (JsonValue);
  rpc List(JsonArgs) returns (JsonValue);
  rpc Remove(StringRequest) returns (Status);
  rpc IsReady(StringRequest) returns (BoolRequest);
  rpc StartGeneration(JsonArgs) returns (JsonValue);
  rpc Generate(JsonArgs) returns (JsonValue);
  rpc Regenerate(StringRequest) returns (JsonValue);
  rpc Save(JsonArgs) returns (JsonValue);
  rpc GetImageModel(Empty) returns (StringRequest);
  rpc SetImageModel(StringRequest) returns (Status);
  rpc GetAvailableImageModels(Empty) returns (JsonValue);
  rpc GetImageDefaultSize(Empty) returns (JsonValue);
  rpc SetImageDefaultSize(StringRequest) returns (Status);
  rpc GetImageDefaultQuality(Empty) returns (JsonValue);
  rpc SetImageDefaultQuality(StringRequest) returns (Status);
  rpc GetImageSettings(Empty) returns (JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 14. EventService — EventManager (SSE 이벤트 + audit log)
// ──────────────────────────────────────────────────────────────────────────
service EventService {
  rpc ListAuditLog(NumberRequest) returns (JsonValue);
  // 추후 streaming RPC: rpc Subscribe(JsonArgs) returns (stream JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 15. StatusService — StatusManager (long-running job)
// ──────────────────────────────────────────────────────────────────────────
service StatusService {
  rpc Start(JsonArgs) returns (JsonValue);
  rpc Update(JsonArgs) returns (JsonValue);
  rpc Complete(JsonArgs) returns (JsonValue);
  rpc Fail(JsonArgs) returns (JsonValue);
  rpc Get(StringRequest) returns (JsonValue);
  rpc List(JsonArgs) returns (JsonValue);
  rpc Stats(Empty) returns (JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 16. CostService — CostManager (LLM 비용 + budget)
// ──────────────────────────────────────────────────────────────────────────

message LlmCostStatsRecordPb {
  string date = 1;
  string model = 2;
  int64 calls = 3;
  int64 input_tokens = 4;
  int64 output_tokens = 5;
  double cost_usd = 6;
}

message LlmCostStatsSummaryPb {
  int64 total_input_tokens = 1;
  int64 total_output_tokens = 2;
  int64 total_cached_tokens = 3;
  double total_cost_usd = 4;
  int64 total_calls = 5;
  repeated LlmCostStatsRecordPb records = 6;
}

message CostBudgetPb {
  double daily_usd = 1;
  double monthly_usd = 2;
  int64 daily_calls = 3;
  int64 monthly_calls = 4;
  int64 alert_at_percent = 5;
}

message BudgetCheckResultPb {
  bool within_budget = 1;
  optional string reason = 2;
  double daily_used_usd = 3;
  double monthly_used_usd = 4;
  int64 daily_calls = 5;
  int64 monthly_calls = 6;
  double daily_limit_usd = 7;
  double monthly_limit_usd = 8;
  int64 daily_limit_calls = 9;
  int64 monthly_limit_calls = 10;
  repeated string alerts = 11;
}

service CostService {
  rpc GetStats(JsonArgs) returns (LlmCostStatsSummaryPb);
  rpc Flush(Empty) returns (Status);
  rpc GetBudget(Empty) returns (CostBudgetPb);
  rpc SetBudget(JsonArgs) returns (Status);
  rpc CheckBudget(Empty) returns (BudgetCheckResultPb);
}

// ──────────────────────────────────────────────────────────────────────────
// 17. ToolService — ToolManager
// ──────────────────────────────────────────────────────────────────────────
service ToolService {
  rpc Register(JsonArgs) returns (Status);
  rpc RegisterMany(JsonArgs) returns (Status);
  rpc Unregister(StringRequest) returns (BoolRequest);
  rpc GetDefinition(StringRequest) returns (JsonValue);
  rpc List(JsonArgs) returns (JsonValue);
  rpc Execute(JsonArgs) returns (JsonValue);
  rpc BuildAiDefinitions(JsonArgs) returns (JsonValue);
  rpc BuildMcpDescriptions(JsonArgs) returns (JsonValue);
  rpc GetStats(Empty) returns (JsonValue);
  rpc GetActivePlanState(StringRequest) returns (JsonValue);
  rpc SetActivePlanState(JsonArgs) returns (Status);
  rpc ClearActivePlanState(StringRequest) returns (Status);
}

// ──────────────────────────────────────────────────────────────────────────
// 18. EntityService — EntityManager (메모리 4-tier: entity + fact)
// ──────────────────────────────────────────────────────────────────────────
service EntityService {
  rpc Save(JsonArgs) returns (JsonValue);
  rpc Update(JsonArgs) returns (JsonValue);
  rpc Delete(NumberRequest) returns (Status);
  rpc Get(NumberRequest) returns (JsonValue);
  rpc FindByName(StringRequest) returns (JsonValue);
  rpc Search(JsonArgs) returns (JsonValue);

  rpc SaveFact(JsonArgs) returns (JsonValue);
  rpc UpdateFact(JsonArgs) returns (JsonValue);
  rpc DeleteFact(NumberRequest) returns (Status);
  rpc GetFact(NumberRequest) returns (JsonValue);
  rpc GetTimeline(JsonArgs) returns (JsonValue);
  rpc SearchFacts(JsonArgs) returns (JsonValue);
  rpc RetrieveContext(JsonArgs) returns (JsonValue);
  rpc CleanupExpiredFacts(Empty) returns (NumberRequest);
}

// ──────────────────────────────────────────────────────────────────────────
// 19. EpisodicService — EpisodicManager (메모리 4-tier: event)
// ──────────────────────────────────────────────────────────────────────────
service EpisodicService {
  rpc SaveEvent(JsonArgs) returns (JsonValue);
  rpc UpdateEvent(JsonArgs) returns (JsonValue);
  rpc DeleteEvent(NumberRequest) returns (Status);
  rpc GetEvent(NumberRequest) returns (JsonValue);
  rpc SearchEvents(JsonArgs) returns (JsonValue);
  rpc ListRecent(JsonArgs) returns (JsonValue);
  rpc ListByEntity(JsonArgs) returns (JsonValue);
  rpc LinkEntity(JsonArgs) returns (Status);
  rpc UnlinkEntity(JsonArgs) returns (Status);
  rpc CleanupExpired(Empty) returns (NumberRequest);
}

// ──────────────────────────────────────────────────────────────────────────
// 20. ConsolidationService — ConsolidationManager (메모리 4-tier: consolidate)
// ──────────────────────────────────────────────────────────────────────────
service ConsolidationService {
  rpc AskLlmText(JsonArgs) returns (JsonValue);
  rpc Consolidate(JsonArgs) returns (JsonValue);
  rpc ConsolidateInactive(JsonArgs) returns (JsonValue);
  rpc GetMemoryStats(Empty) returns (JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 21. TemplateService — TemplateManager
// ──────────────────────────────────────────────────────────────────────────
service TemplateService {
  rpc List(Empty) returns (JsonValue);
  rpc Get(StringRequest) returns (JsonValue);
  rpc Save(JsonArgs) returns (Status);
  rpc Delete(StringRequest) returns (Status);
}

// ──────────────────────────────────────────────────────────────────────────
// Cross-cutting (Core facade 직속)
// ──────────────────────────────────────────────────────────────────────────

// ─── SettingsService typed messages ────────────────────────────────────────

message AiModelResponsePb {
  string model = 1;
}

message AiAssistantModelPb {
  string id = 1;
  string display_name = 2;
}

message AiAssistantModelListPb {
  repeated AiAssistantModelPb models = 1;
}

/** key → model name 맵을 JSON string 으로 직렬화 (동적 키 집합, typed map 불가) */
message LastModelByCategoryPb {
  string raw_json = 1;
}

/** Settings — timezone / aiModel / userPrompt / anthropicCache / 등 */
service SettingsService {
  rpc GetTimezone(Empty) returns (StringRequest);
  rpc SetTimezone(StringRequest) returns (BoolRequest);
  rpc GetAiModel(Empty) returns (AiModelResponsePb);
  rpc SetAiModel(StringRequest) returns (BoolRequest);
  rpc GetAiThinkingLevel(Empty) returns (StringRequest);
  rpc SetAiThinkingLevel(StringRequest) returns (BoolRequest);
  rpc GetUserPrompt(Empty) returns (StringRequest);
  rpc SetUserPrompt(StringRequest) returns (BoolRequest);
  rpc GetAnthropicCacheEnabled(Empty) returns (BoolRequest);
  rpc SetAnthropicCacheEnabled(BoolRequest) returns (BoolRequest);
  rpc GetLastModelByCategory(Empty) returns (LastModelByCategoryPb);
  rpc SetLastModelByCategory(JsonArgs) returns (BoolRequest);
  rpc GetAiAssistantModel(Empty) returns (StringRequest);
  rpc SetAiAssistantModel(StringRequest) returns (BoolRequest);
  rpc GetAiAssistantDefault(Empty) returns (StringRequest);
  rpc GetAvailableAiAssistantModels(Empty) returns (AiAssistantModelListPb);
}

/** Network — Sandbox 안에서 안전한 외부 fetch */
service NetworkService {
  rpc Fetch(JsonArgs) returns (JsonValue);
}

/** Cache — sysmod 결과 cache 공통 layer */
service CacheService {
  rpc Read(JsonArgs) returns (JsonValue);
  rpc Grep(JsonArgs) returns (JsonValue);
  rpc Aggregate(JsonArgs) returns (JsonValue);
  rpc Drop(StringRequest) returns (Status);
}

/** Telegram — 양방향 봇 + send-only */
service TelegramService {
  rpc SetupWebhook(StringRequest) returns (JsonValue);
  rpc RemoveWebhook(Empty) returns (JsonValue);
  rpc GetWebhookStatus(Empty) returns (JsonValue);
  rpc IsOwner(StringRequest) returns (BoolRequest);
  rpc GetWebhookSecret(Empty) returns (JsonValue);
  rpc ProcessMessage(JsonArgs) returns (JsonValue);
}

/** Database — raw query (BIBLE 의 도메인 port 마이그레이션 영역 — Phase B 개선 후보) */
service DatabaseService {
  rpc Query(JsonArgs) returns (JsonValue);
}

/** Memory — Claude memory file 시스템 */
service MemoryService {
  rpc GetIndex(Empty) returns (StringRequest);
  rpc ReadFile(StringRequest) returns (JsonValue);
  rpc ListFiles(Empty) returns (JsonValue);
  rpc SaveFile(JsonArgs) returns (Status);
  rpc DeleteFile(StringRequest) returns (Status);
}

/** Lifecycle / Health — 헬스 체크 + graceful shutdown 등 */
service LifecycleService {
  rpc Health(Empty) returns (HealthInfo);
  rpc CaptureException(JsonArgs) returns (Status);
  rpc GracefulShutdown(NumberRequest) returns (Status);
}

/** ErrorReport — captureException 분리 (선택) */
// 위 LifecycleService 에 통합됨

// ──────────────────────────────────────────────────────────────────────────
// Phase B 진행 시 변환 룰:
//  1. JsonArgs / JsonValue → 매니저별 typed message 로 swap
//  2. tonic-build 가 Rust 구조체 자동 생성
//  3. TS client (lib/core-client.ts) 도 generated stub 활용 — typed 안전 보장
//  4. service 단위 dual-run 검증 (옛 Node 결과 vs Rust 결과 diff)
// ──────────────────────────────────────────────────────────────────────────
