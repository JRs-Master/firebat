# Firebat CI — push / PR 시 자동 검증 (Rust + TypeScript).
#
# 목적: 8GB RAM 로컬 환경에서 cargo test 폭주 회피. push 만 하면 GitHub Linux runner
# (7GB RAM 무료) 가 자동으로 검증 → 결과만 확인.
#
# 무료 한도: 월 2000분 (private repo). Rust 캐시 활성으로 보통 5-10분 완료.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # 수동 trigger 가능

# 같은 PR 의 옛 run 자동 취소 (분 절약)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Node 24 강제 — 2026-06-02 부터 default 라 미리 opt-in (deprecation warning 회피)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Rust — cargo check + test
  # ────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (cargo test)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # protoc 명시 install — protoc-bin-vendored 가 동봉이지만 일부 환경 mismatch 회피
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      # Cargo registry + target 캐시 — push 마다 재빌드 회피 (~70% 시간 절감)
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: firebat-rust
          cache-on-failure: true

      - name: cargo check
        run: cargo check -p firebat-core -p firebat-infra --all-targets
        env:
          CARGO_BUILD_JOBS: 4

      - name: cargo test (infra)
        run: cargo test -p firebat-infra --tests
        env:
          # CI 환경에선 jobs 제한 해제 (Linux runner 7GB RAM, 4 vCPU 활용)
          CARGO_BUILD_JOBS: 4

  # ────────────────────────────────────────────────────────────────────
  # TypeScript — typecheck
  # ────────────────────────────────────────────────────────────────────
  typescript:
    name: TypeScript (tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: npm ci
        # peer deps mismatch (next 16 + react 19 + 기타) 회피
        run: npm ci --legacy-peer-deps

      - name: typecheck
        run: npm run typecheck

  # ────────────────────────────────────────────────────────────────────
  # Release binary (main 만) — Vultr 배포용 산출물
  # ────────────────────────────────────────────────────────────────────
  release-binary:
    name: Release binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'
    needs: [rust, typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: firebat-release
          cache-on-failure: true

      - name: cargo build --release
        run: cargo build --release -p firebat-infra --bin firebat-core
        env:
          CARGO_BUILD_JOBS: 4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firebat-core-linux-x86_64
          path: target/release/firebat-core
          retention-days: 30
          # 30일간 GitHub UI 에서 download 가능 (Vultr 에 scp 시 사용)
