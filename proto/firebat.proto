// Firebat Core gRPC schema (v1.0 Final Phase A — skeleton + service 분리).
//
// Phase A: 21 매니저 + cross-cutting service skeleton 박음. RPC list 정의.
//          message body 는 JsonValue 단일화 — Phase B 에서 매니저별 typed message 로 점진 변환.
// Phase B: 각 매니저 Rust 구현하면서 typed request/response 박음.
//
// 사용 path:
//  - Rust Core: tonic-build (build.rs) 가 .proto 컴파일 → src/proto/ 자동 생성
//  - TS client (lib/core-client.ts 의 'rust' backend): @grpc/grpc-js + protoc-gen-ts
//
// 21 매니저:
//   AiManager / StorageManager / PageManager / ProjectManager / ModuleManager
//   TaskManager / ScheduleManager / SecretManager / McpManager / CapabilityManager
//   AuthManager / ConversationManager / MediaManager / EventManager / StatusManager
//   CostManager / ToolManager / EntityManager / EpisodicManager / ConsolidationManager / TemplateManager
//
// Cross-cutting (Core facade 직속): Settings / Network / Cache / Telegram / Database / Lifecycle / Memory file

syntax = "proto3";

package firebat.v1;

// ──────────────────────────────────────────────────────────────────────────
// 공통 타입
// ──────────────────────────────────────────────────────────────────────────

message Empty {}

/** RPC 응답의 ok / error 표준 */
message Status {
  bool ok = 1;
  string error = 2;
  string error_code = 3;
}

/** Phase A: typed message 정의 전 사용. JSON 직렬화 string. Phase B 에서 매니저별 typed 로 swap. */
message JsonValue {
  string raw = 1;
}

/** 인자 0~N 개 — JsonValue 배열. 단일 객체면 raw=JSON 문자열, 다인자면 array. */
message JsonArgs {
  string raw = 1;
}

/** ID 단일 인자 — string 또는 number 허용 */
message IdRequest {
  string id = 1;
}

message StringRequest { string value = 1; }
message NumberRequest { int64 value = 1; }
message BoolRequest { bool value = 1; }

/** 헬스 / 버전 정보 */
message HealthInfo {
  string version = 1;
  int64 uptime_ms = 2;
  bool ready = 3;
  repeated string active_managers = 4;
}

// ──────────────────────────────────────────────────────────────────────────
// 1. AiService — AiManager
//   process / requestActionWithTools / codeAssist / runAgentJob / resolveCallTarget /
//   spawnSubAgent / isSubAgentEnabled / setSubAgentEnabled
// ──────────────────────────────────────────────────────────────────────────
service AiService {
  rpc Process(JsonArgs) returns (JsonValue);
  rpc RequestActionWithTools(JsonArgs) returns (JsonValue);
  rpc CodeAssist(JsonArgs) returns (JsonValue);
  rpc RunAgentJob(JsonArgs) returns (JsonValue);
  rpc ResolveCallTarget(StringRequest) returns (JsonValue);
  rpc SpawnSubAgent(JsonArgs) returns (JsonValue);
  rpc IsSubAgentEnabled(Empty) returns (BoolRequest);
  rpc SetSubAgentEnabled(BoolRequest) returns (Status);
}

// ──────────────────────────────────────────────────────────────────────────
// 2. StorageService — StorageManager
// ──────────────────────────────────────────────────────────────────────────
service StorageService {
  rpc ReadFile(StringRequest) returns (JsonValue);
  rpc ReadFileBinary(StringRequest) returns (JsonValue);
  rpc WriteFile(JsonArgs) returns (Status);
  rpc DeleteFile(StringRequest) returns (Status);
  rpc ListDir(StringRequest) returns (JsonValue);
  rpc ListFiles(StringRequest) returns (JsonValue);
  rpc GetFileTree(StringRequest) returns (JsonValue);
  rpc GlobFiles(JsonArgs) returns (JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 3. PageService — PageManager
// ──────────────────────────────────────────────────────────────────────────
service PageService {
  rpc List(Empty) returns (JsonValue);
  rpc Search(JsonArgs) returns (JsonValue);
  rpc Get(StringRequest) returns (JsonValue);
  rpc Save(JsonArgs) returns (JsonValue);
  rpc Delete(StringRequest) returns (Status);
  rpc Rename(JsonArgs) returns (Status);
  rpc GetRedirect(StringRequest) returns (JsonValue);
  rpc ListStatic(Empty) returns (JsonValue);
  rpc FindMediaUsage(StringRequest) returns (JsonValue);
  rpc SetVisibility(JsonArgs) returns (Status);
  rpc VerifyPassword(JsonArgs) returns (BoolRequest);
  rpc FindRelated(JsonArgs) returns (JsonValue);
  rpc ListAllTags(Empty) returns (JsonValue);
}

// ──────────────────────────────────────────────────────────────────────────
// 4. ProjectService — ProjectManager
// ──────────────────────────────────────────────────────────────────────────
service ProjectService {
  rpc Scan(Empty) returns (JsonValue);
  rpc SetVisibility(JsonArgs) returns (Status);
  rpc GetVisibility(StringRequest) returns (JsonValue);
  rpc GetConfig(StringRequest) returns (JsonValue);
  rpc SetConfig(JsonArgs) returns (Status);
  rpc VerifyPassword(JsonArgs) returns (BoolRequest);
  rpc Delete(StringRequest) returns (Status);
  rpc Rename(JsonArgs) returns (Status);
}

// ──────────────────────────────────────────────────────────────────────────
// 5. ModuleService — ModuleManager
