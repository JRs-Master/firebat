// ─── AuthService typed Request / Response messages ─────────────────────────
// 옛 공유 타입 (Empty / BoolRequest / StringRequest / NumberRequest / AuthSessionPb)
// → RPC 별 unique 분리 (buf STANDARD lint RPC_REQUEST_RESPONSE_UNIQUE).
// LoginResponsePb / ApiTokenInfoPb / AdminCredentialsPb 는 이미 unique Response 이므로 유지.
message AuthLoginRequest {
  string id = 1;
  string password = 2;
  // IP / cookie 기반 lock counter 키 (rate limit). 빈 string 이면 lock 없음.
  optional string attempt_key = 3;
}

message AuthLogoutRequest { string session_token = 1; }
message AuthLogoutResponse { bool ok = 1; }

message AuthValidateSessionRequest { string session_token = 1; }
// session.token 빈 문자열이면 미인증 (옛 Option<AuthSession>::None 에 해당).
message AuthValidateSessionResponse { AuthSessionPb session = 1; }

message AuthValidateTokenRequest { string token = 1; }
message AuthValidateTokenResponse { AuthSessionPb session = 1; }

message AuthGenerateApiTokenRequest { string label = 1; }
message AuthGenerateApiTokenResponse { string token = 1; }

message AuthValidateApiTokenRequest { string token = 1; }
message AuthValidateApiTokenResponse { AuthSessionPb session = 1; }

message AuthRevokeApiTokensRequest {}
message AuthRevokeApiTokensResponse { int64 revoked_count = 1; }

message AuthGetApiTokenInfoRequest {}
message AuthGetAdminCredentialsRequest {}

message AuthSetAdminCredentialsRequest {
  // 부분 변경 가능 — setup wizard 는 둘 다, 비번 변경 PATCH 는 password 만.
  optional string id = 1;
  optional string password = 2;
}
message AuthSetAdminCredentialsResponse {}

message AuthIsAdminSetupRequest {}
message AuthIsAdminSetupResponse { bool is_setup = 1; }

message AuthVerifyAdminPasswordRequest { string password = 1; }
message AuthVerifyAdminPasswordResponse { bool valid = 1; }

message AuthValidatePasswordPolicyRequest {
  string password = 1;
  optional string id = 2;
}
message AuthValidatePasswordPolicyResponse {}

// ──────────────────────────────────────────────────────────────────────────
// 11. AuthService — AuthManager
// ──────────────────────────────────────────────────────────────────────────
service AuthService {
  rpc Login(AuthLoginRequest) returns (LoginResponsePb);
  rpc Logout(AuthLogoutRequest) returns (AuthLogoutResponse);
  rpc ValidateSession(AuthValidateSessionRequest) returns (AuthValidateSessionResponse);
  rpc ValidateToken(AuthValidateTokenRequest) returns (AuthValidateTokenResponse);
  rpc GenerateApiToken(AuthGenerateApiTokenRequest) returns (AuthGenerateApiTokenResponse);
  rpc ValidateApiToken(AuthValidateApiTokenRequest) returns (AuthValidateApiTokenResponse);
  rpc RevokeApiTokens(AuthRevokeApiTokensRequest) returns (AuthRevokeApiTokensResponse);
  rpc GetApiTokenInfo(AuthGetApiTokenInfoRequest) returns (ApiTokenInfoPb);
  rpc GetAdminCredentials(AuthGetAdminCredentialsRequest) returns (AdminCredentialsPb);
  rpc SetAdminCredentials(AuthSetAdminCredentialsRequest) returns (AuthSetAdminCredentialsResponse);
  // 첫 부팅 setup 검출 — frontend `/login` 이 호출, is_setup=false 면 setup wizard 노출.
  rpc IsAdminSetup(AuthIsAdminSetupRequest) returns (AuthIsAdminSetupResponse);
  // 평문 비번 검증 — argon2 hash 비교. SettingsModal 의 비번 변경 PATCH 가 사용
  // (login 부작용 — lock counter / 세션 발급 — 회피).
  rpc VerifyAdminPassword(AuthVerifyAdminPasswordRequest) returns (AuthVerifyAdminPasswordResponse);
  // 비번 정책 검증 — 8자 이상 + 4 categories 중 3 이상 + (옵션) ID 동일 금지.
  // 입력: {password, id?}. 응답: empty (실패 시 InvalidArgument 에러 — error_code 메시지).
  // SetupWizard / 비번 변경 PATCH / setup POST 모두 단일 source.
  rpc ValidatePasswordPolicy(AuthValidatePasswordPolicyRequest) returns (AuthValidatePasswordPolicyResponse);
}

