// ──────────────────────────────────────────────────────────────────────────
// 12. ConversationService — ConversationManager (+ Share)
// ──────────────────────────────────────────────────────────────────────────
service ConversationService {
  rpc List(StringRequest) returns (ConversationListPb);
  rpc Get(ConversationOwnerIdRequest) returns (ConversationRecordPb);
  rpc Save(ConversationSaveRequest) returns (Status);
  /// 삭제 — soft delete. conversations.deleted_at 추가. 30일 후 cleanup cron 이 cascade 삭제.
  rpc Delete(ConversationOwnerIdRequest) returns (Status);
  rpc IsDeleted(ConversationOwnerIdRequest) returns (BoolRequest);
  /// 휴지통 (soft-deleted) 목록 — owner 기준. 최신 삭제 순.
  rpc ListDeleted(StringRequest) returns (ConversationListPb);
  /// 휴지통에서 복원 — deleted_at NULL. 30일 cleanup 대상에서 제외.
  rpc Restore(ConversationOwnerIdRequest) returns (Status);
  /// 영구 삭제 — DB row + 첨부 이미지 cascade. 휴지통에서도 사라짐.
  rpc PermanentDelete(ConversationOwnerIdRequest) returns (Status);
  rpc SearchHistory(ConversationSearchHistoryRequest) returns (HistorySearchResultPb);
  rpc GetCliSession(ConversationGetCliSessionRequest) returns (OptionalStringPb);
  rpc SetCliSession(ConversationSetCliSessionRequest) returns (Status);
  rpc CreateShare(ConversationCreateShareRequest) returns (ShareResultPb);
  rpc GetShare(StringRequest) returns (SharedConversationPb);
  rpc CleanupExpiredShares(Empty) returns (NumberRequest);
  /// 30일 retention cleanup — soft-deleted conversations + 임시 첨부 이미지 cascade.
  /// internal cron 이 6h 마다 호출.
  rpc CleanupOldDeleted(Empty) returns (NumberRequest);
}

