  // 노출 형태 (boolean 2개 — 한 instance 가 widget / page 둘 다 활성 가능). default 둘 다 true.
  bool expose_widget = 14;                    // 외부 사이트 임베드 풍선 widget (allowed_domains 검증)
  bool expose_page = 15;                      // 우리 사이트 풀스크린 URL `/<slug>` (self host 자동 허용)
